name: E2E-Full

on:
  pull_request:
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
    types: [ labeled, synchronize ]

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write

# only cancel in-progress runs of the same workflow
# and ignore the lint / 1 card / 4 cards test type
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: linux-aarch64-a2b3-0
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ready') && contains(github.event.pull_request.labels.*.name, 'ready-for-test') }}
    outputs:
      e2e_tracker: ${{ steps.filter.outputs.e2e_tracker }}
      ut_tracker: ${{ steps.filter.outputs.ut_tracker }}
    steps:
      - name: Setup git proxy
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://gh-proxy.test.osinfra.cn/https://github.com/".insteadOf https://github.com/
      # NOTE: Do not update the version of checkout, there have some issue on self_hosted runner with the higher version
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e_tracker:
              - '.github/workflows/pr_test_full.yaml'
              - '.github/workflows/_e2e_test.yaml'
              - 'vllm_ascend/**'
              - 'csrc/**'
              - 'cmake/**'
              - 'tests/e2e/**'
              - 'CMakeLists.txt'
              - 'setup.py'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'requirements-lint.txt'
              - 'packages.txt'
            ut_tracker:
              - 'tests/ut/**'

  e2e-test:
    name: e2e-full
    strategy:
      matrix:
        vllm_version: [4034c3d32e30d01639459edd3ab486f56993876d, v0.16.0]
    needs: [changes]
    if: ${{ needs.changes.outputs.e2e_tracker == 'true' || needs.changes.outputs.e2e_tracker == true }}
    uses: ./.github/workflows/_e2e_test.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
      contains_310: false
      type: full

  parse-comment:
    name: Parse /e2e comment
    runs-on: linux-aarch64-a2b3-0
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-test') }}
    outputs:
      allowed: ${{ steps.resolve.outputs.allowed }}
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      singlecard_tests: ${{ steps.parse.outputs.singlecard_tests }}
      multicard_2_tests: ${{ steps.parse.outputs.multicard_2_tests }}
      multicard_4_tests: ${{ steps.parse.outputs.multicard_4_tests }}
      p310_tests: ${{ steps.parse.outputs.p310_tests }}
    steps:
      - name: Resolve actor, SHA and /e2e comment body
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let actor, prSha, prNumber, prAuthor, commentBody;

            // pull_request event with 'e2e-test' label: search comments for the latest /e2e command.
            prNumber = context.payload.pull_request.number;
            prAuthor = context.payload.pull_request.user.login;
            prSha = context.payload.pull_request.head.sha;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            for (let i = comments.length - 1; i >= 0; i--) {
              if (comments[i].body && comments[i].body.trim().match(/^\/e2e/m)) {
                commentBody = comments[i].body;
                actor = comments[i].user.login;
                break;
              }
            }
            if (!actor) {
              core.setOutput('allowed', 'false');
              core.info('No /e2e comment found; skipping.');
              return;
            }

            // Allow PR author or any collaborator with write/admin access
            const isPRAuthor = actor === prAuthor;
            let hasWriteAccess = false;
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              hasWriteAccess = ['admin', 'write'].includes(data.permission);
            } catch (e) {
              hasWriteAccess = false;
            }
            const allowed = isPRAuthor || hasWriteAccess;
            if (!allowed) {
              core.warning(`User ${actor} is not authorized to trigger E2E tests`);
            }
            core.setOutput('allowed', allowed.toString());
            core.setOutput('pr_sha', prSha);
            core.setOutput('comment_body', commentBody);

      - name: Parse /e2e command and categorize tests by runner
        id: parse
        if: steps.resolve.outputs.allowed == 'true'
        env:
          COMMENT_BODY: ${{ steps.resolve.outputs.comment_body }}
        run: |
          # Strip /e2e prefix and normalize whitespace (handles space/newline separated lists)
          TESTS=$(echo "$COMMENT_BODY" | sed 's|^/e2e[[:space:]]*||' | tr '\n' ' ' | xargs)
          echo "All specified tests: $TESTS"

          SINGLECARD_TESTS=""
          MULTICARD_2_TESTS=""
          MULTICARD_4_TESTS=""
          P310_TESTS=""

          for TEST in $TESTS; do
            if echo "$TEST" | grep -q "multicard/2-cards"; then
              MULTICARD_2_TESTS="$MULTICARD_2_TESTS $TEST"
            elif echo "$TEST" | grep -q "multicard/4-cards"; then
              MULTICARD_4_TESTS="$MULTICARD_4_TESTS $TEST"
            elif echo "$TEST" | grep -q "310p"; then
              P310_TESTS="$P310_TESTS $TEST"
            else
              SINGLECARD_TESTS="$SINGLECARD_TESTS $TEST"
            fi
          done

          echo "singlecard_tests=$(echo "$SINGLECARD_TESTS" | xargs || true)" >> $GITHUB_OUTPUT
          echo "multicard_2_tests=$(echo "$MULTICARD_2_TESTS" | xargs || true)" >> $GITHUB_OUTPUT
          echo "multicard_4_tests=$(echo "$MULTICARD_4_TESTS" | xargs || true)" >> $GITHUB_OUTPUT
          echo "p310_tests=$(echo "$P310_TESTS" | xargs || true)" >> $GITHUB_OUTPUT


  e2e-comment-test:
    name: e2e-comment (${{ matrix.vllm_version }})
    strategy:
      fail-fast: false
      matrix:
        vllm_version: [4034c3d32e30d01639459edd3ab486f56993876d, v0.16.0]
    needs: [parse-comment]
    if: ${{ needs.parse-comment.outputs.allowed == 'true' }}
    uses: ./.github/workflows/_e2e_test.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.0-910b-ubuntu22.04-py3.11
      type: comment
      ref: ${{ needs.parse-comment.outputs.pr_sha }}
      singlecard_tests: ${{ needs.parse-comment.outputs.singlecard_tests }}
      multicard_2_tests: ${{ needs.parse-comment.outputs.multicard_2_tests }}
      multicard_4_tests: ${{ needs.parse-comment.outputs.multicard_4_tests }}
      p310_tests: ${{ needs.parse-comment.outputs.p310_tests }}
