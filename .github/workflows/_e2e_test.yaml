name: 'e2e test'

on:
  workflow_call:
    inputs:
      vllm:
        required: true
        type: string
      image:
        required: true
        type: string
      type:
        required: true
        type: string
      contains_310:
        required: true
        type: boolean
      continue_on_error:
        required: false
        type: boolean
        default: false

jobs:
  e2e-light:
    name: singlecard-light
    if: ${{ inputs.type == 'light' }}
    runs-on: linux-aarch64-a2b3-1
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    container:
      image: ${{ inputs.image }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test
        working-directory: /vllm-workspace/vllm-ascend
        env:
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-singlecard-light \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1 \
              --auto-upgrade-estimated-times \
              --continue-on-error
          else
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-singlecard-light \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1
          fi


      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: ${{ inputs.continue_on_error == true }}
        with:
          name: timing-data-singlecard-light-part${{ matrix.part }}
          path: test_timing_data.json
          if-no-files-found: warn
          retention-days: 5

  e2e-full:
    name: singlecard-full
    if: ${{ inputs.type == 'full' }}
    runs-on: linux-aarch64-a2b3-1
    strategy:
      fail-fast: false
      matrix:
        part: [0, 1]
    container:
      image: ${{ inputs.image }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
        MODELSCOPE_HUB_FILE_LOCK: False
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Run e2e test
        working-directory: /vllm-workspace/vllm-ascend
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-singlecard \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 2 \
              --auto-upgrade-estimated-times \
              --continue-on-error
          else
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-singlecard \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 2
          fi

      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: ${{ inputs.continue_on_error == true }}
        with:
          name: timing-data-singlecard-full-part${{ matrix.part }}
          path: test_timing_data.json
          if-no-files-found: warn
          retention-days: 5

  e2e-2-cards-light:
    name: multicard-2-light
    if: ${{ inputs.type == 'light' }}
    runs-on: linux-aarch64-a3-2
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    container:
      image: ${{ inputs.image }}-a3
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HCCL_BUFFSIZE: 1024
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test (light)
        working-directory: /vllm-workspace/vllm-ascend
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-2card-light \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1 \
              --auto-upgrade-estimated-times \
              --continue-on-error
          else
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-2card-light \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1
          fi


      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: ${{ inputs.continue_on_error == true }}
        with:
          name: timing-data-2card-light-part${{ matrix.part }}
          path: test_timing_data.json
          if-no-files-found: warn
          retention-days: 5

  e2e-2-cards-full:
    name: multicard-2-full
    if: ${{ inputs.type == 'full' }}
    runs-on: linux-aarch64-a3-2
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    container:
      image: ${{ inputs.image }}-a3
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HCCL_BUFFSIZE: 1024
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test (full)
        working-directory: /vllm-workspace/vllm-ascend
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-multicard-2-cards \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1 \
              --auto-upgrade-estimated-times \
              --continue-on-error
          else
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-multicard-2-cards \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1
          fi


      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: ${{ inputs.continue_on_error == true }}
        with:
          name: timing-data-2card-full-part${{ matrix.part }}
          path: test_timing_data.json
          if-no-files-found: warn
          retention-days: 5

      - name: Run vllm-project/vllm-ascend test (non triton)
        if: ${{ inputs.type == 'full' && matrix.part == 0 }}
        working-directory: /vllm-workspace/vllm-ascend
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          python3 -m pip uninstall -y triton-ascend
          pytest -sv --durations=0 tests/e2e/multicard/2-cards/test_aclgraph_capture_replay.py

  e2e-4-cards-full:
    name: multicard-4-full
    if: ${{ inputs.type == 'full' }}
    runs-on: linux-aarch64-a3-4
    strategy:
      fail-fast: false
      matrix:
        part: [0]
    container:
      image: ${{ inputs.image }}-a3
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test for V1 Engine
        working-directory: /vllm-workspace/vllm-ascend
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-multicard-4-cards \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1 \
              --auto-upgrade-estimated-times \
              --continue-on-error
          else
            python3 .github/workflows/scripts/run_suite.py \
              --suite e2e-multicard-4-cards \
              --auto-partition-id "${{ matrix.part }}" \
              --auto-partition-size 1
          fi


      - name: Upload timing data
        uses: actions/upload-artifact@v4
        if: ${{ inputs.continue_on_error == true }}
        with:
          name: timing-data-4card-full-part${{ matrix.part }}
          path: test_timing_data.json
          if-no-files-found: warn
          retention-days: 5

  e2e_310p:
    name: 310p singlecard
    runs-on: linux-aarch64-310p-1
    if: ${{ inputs.contains_310 }}
    container:
      image: ${{ inputs.image }}-310p
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test
        working-directory: /vllm-workspace/vllm-ascend
        env:
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          pytest -sv --durations=0 tests/e2e/310p/singlecard/test_dense_model_singlecard.py

  e2e_310p-4cards:
    name: 310p multicards 4cards
    runs-on: linux-aarch64-310p-4
    if: ${{ inputs.contains_310 }}
    container:
      image: ${{ inputs.image }}-310p
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
    steps:
      - name: Check npu and CANN info
        run: |
          npu-smi info
          cat /usr/local/Ascend/ascend-toolkit/latest/"$(uname -i)"-linux/ascend_toolkit_install.info

      - name: Switch vLLM version
        working-directory: /vllm-workspace/vllm
        run: |
          # vLLM is installed in editable mode, switch to target version
          git fetch --depth 1 origin ${{ inputs.vllm }}
          git checkout ${{ inputs.vllm }}
          # Reinstall vLLM with the new version
          VLLM_TARGET_DEVICE="empty" pip install -e .[audio] --extra-index https://download.pytorch.org/whl/cpu/

      - name: Install test dependencies
        working-directory: /vllm-workspace/vllm-ascend
        run: |
          pip install -r requirements-dev.txt

      - name: Run vllm-project/vllm-ascend test
        working-directory: /vllm-workspace/vllm-ascend
        env:
          PYTORCH_NPU_ALLOC_CONF: max_split_size_mb:256
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          pytest -sv --durations=0 \
          tests/e2e/310p/multicard/test_dense_model_multicard.py \
          tests/e2e/310p/multicard/test_moe_model_multicard.py