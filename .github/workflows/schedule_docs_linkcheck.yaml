name: Scheduled docs link check

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-linkcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Sphinx linkcheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docs/requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Run Sphinx linkcheck
        run: |
          make -C docs linkcheck SPHINXOPTS="-W --keep-going"

      - name: Upload linkcheck reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-linkcheck-report
          path: |
            docs/_build/linkcheck/output.txt
            docs/_build/linkcheck/output.json
          if-no-files-found: warn
