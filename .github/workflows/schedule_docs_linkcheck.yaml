name: Docs link check

on:
  pull_request:
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-linkcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Sphinx linkcheck
    runs-on: linux-aarch64-a2b3-0
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-cpu
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Run Sphinx linkcheck
        run: |
          make -C docs linkcheck SPHINXOPTS="-W --keep-going"

      - name: Upload linkcheck reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-linkcheck-report
          path: |
            docs/_build/linkcheck/output.txt
            docs/_build/linkcheck/output.json
          if-no-files-found: warn
          retention-days: 5
