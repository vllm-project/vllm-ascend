name: 'e2e nightly test external dp'

on:
  workflow_call:
    inputs:
      soc_version:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: linux-aarch64-a3-0
      image:
        required: false
        type: string
        default: "swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-910b-ubuntu22.04-py3.11"
      config_file_path:
        required: true
        type: string
      replicas:
        required: false
        default: "1"
        type: string
      size:
        required: false
        default: "2"
        type: string
      vllm_ascend_remote_url:
        required: false
        default: https://github.com/vllm-project/vllm-ascend.git
        type: string
      vllm_ascend_ref:
        required: false
        default: main
        type: string
      should_run:
        required: true
        type: boolean
      ascend_log_prefix:
        required: false
        default: /root/.cache/ascend-logs
        type: string
      name:
        required: false
        type: string
        default: ''
      vllm_ascend_branch:
        required: false
        type: string
        default: ''
    secrets:
      KUBECONFIG_B64:
        required: true
      OBS_ACCESS_KEY:
        required: false
      OBS_SECRET_KEY:
        required: false

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ascend-nightly-${{ github.workflow_ref }}-${{ github.ref }}-${{ inputs.soc_version }}-external-dp-${{ inputs.config_file_path }}
  cancel-in-progress: true

jobs:
  e2e:
    name: ${{ inputs.config_file_path }}
    timeout-minutes: 120
    runs-on: ${{ inputs.runner }}
    if: ${{ inputs.should_run }}
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend:nightly-cpu
      env:
        KUBECONFIG: /tmp/kubeconfig
        NAMESPACE: vllm-project
    steps:
      - name: Decode kubeconfig
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cp /root/.cache/.kube/kubeconfig.yaml "$KUBECONFIG"
          else
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$KUBECONFIG"
          fi

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set job variables
        id: vars
        run: |
          config_file="${{ inputs.config_file_path }}"
          config_stem="${config_file%.yaml}"
          lws_suffix=$(echo "$config_stem" | tr '[:upper:]' '[:lower:]' | tr '._' '-' | cut -c1-43)
          rand_suffix=$(tr -d '-' < /proc/sys/kernel/random/uuid | cut -c1-6)
          LWS_NAME="vllm-ext-dp-${lws_suffix}-${rand_suffix}"

          branch="${{ inputs.vllm_ascend_branch }}"
          if [ -n "$branch" ]; then
            ARTIFACT_NAME="${branch}-${config_stem}-external-dp-ascend-logs"
          else
            ARTIFACT_NAME="${config_stem}-external-dp-ascend-logs"
          fi

          job_name="${{ inputs.name }}"
          if [ -z "$job_name" ]; then
            job_name="$config_stem"
          fi
          BENCHMARK_JOB_NAME="${branch}-${job_name}"

          {
            echo "LWS_NAME=${LWS_NAME}"
            echo "LEADER_POD=${LWS_NAME}-0"
            echo "LOG_PREFIX=${{ inputs.ascend_log_prefix }}/${LWS_NAME}"
          } >> "$GITHUB_ENV"

          {
            echo "artifact_name=${ARTIFACT_NAME}"
            echo "benchmark_job_name=${BENCHMARK_JOB_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare scripts
        run: |
          install -D tests/e2e/nightly/multi_node/external_dp/scripts/run.sh /root/.cache/tests/run.sh

      - name: Clear resources
        run: |
          set -euo pipefail
          kubectl delete leaderworkerset "$LWS_NAME" -n "$NAMESPACE" --ignore-not-found
          kubectl delete service "${LWS_NAME}-leader" -n "$NAMESPACE" --ignore-not-found

      - name: Launch cluster
        run: |
          set -euo pipefail

          if [ "${{ inputs.soc_version }}" = "a3" ]; then
            npu_per_node=16
            pvc_name=nv-action-vllm-benchmarks-v2
          else
            npu_per_node=8
            pvc_name=vllm-project-hk001
          fi

          jinja2 tests/e2e/nightly/multi_node/scripts/lws.yaml.jinja2 \
            -D lws_name="$LWS_NAME" \
            -D log_prefix="$LOG_PREFIX" \
            -D size="${{ inputs.size }}" \
            -D replicas="${{ inputs.replicas }}" \
            -D image="${{ inputs.image }}" \
            -D config_file_path="${{ inputs.config_file_path }}" \
            -D config_base_path="tests/e2e/nightly/multi_node/external_dp/config/" \
            -D npu_per_node="$npu_per_node" \
            -D fail_tag="FAIL_TAG_${{ inputs.config_file_path }}" \
            -D is_pr_test="${{ github.event_name == 'pull_request' }}" \
            -D vllm_ascend_ref="${{ inputs.vllm_ascend_ref }}" \
            -D vllm_ascend_remote_url="${{ inputs.vllm_ascend_remote_url }}" \
            -D pvc_name="$pvc_name" \
            -D benchmark_job_name="${{ steps.vars.outputs.benchmark_job_name }}" \
            -D runner="${{ inputs.soc_version }}" \
            --outfile lws.yaml

          kubectl apply -f ./lws.yaml

      - name: Wait for pods ready
        run: |
          set -euo pipefail
          SIZE="${{ inputs.size }}"
          TIMEOUT=1200
          START_TIME=$(date +%s)
          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))
            if [[ $ELAPSED -ge $TIMEOUT ]]; then
              kubectl get pods -n "$NAMESPACE"
              kubectl describe pod "$LEADER_POD" -n "$NAMESPACE"
              exit 1
            fi

            ALL_READY=true
            for ((i=0; i<SIZE; i++)); do
              if [ "${i}" -eq 0 ]; then
                POD="${LWS_NAME}-0"
              else
                POD="${LWS_NAME}-0-${i}"
              fi
              PHASE=$(kubectl get pod "$POD" -n "$NAMESPACE" -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
              READY=$(kubectl get pod "$POD" -n "$NAMESPACE" -o jsonpath='{.status.containerStatuses[*].ready}' 2>/dev/null)
              echo "Pod [$POD] phase=$PHASE ready=$READY"
              if [[ "$PHASE" != "Running" || "$READY" != "true" ]]; then
                ALL_READY=false
                break
              fi
            done

            if [[ "$ALL_READY" == "true" ]]; then
              break
            fi
            sleep 2
          done

      - name: Stream logs
        run: |
          set -euo pipefail
          size="${{ inputs.size }}"
          pids=()

          cleanup() {
            for pid in "${pids[@]}"; do
              kill "$pid" 2>/dev/null || true
            done
          }
          trap cleanup EXIT

          for i in $(seq 0 $((size - 1))); do
            if [ "${i}" -eq 0 ]; then
              POD="${LWS_NAME}-0"
            else
              POD="${LWS_NAME}-0-${i}"
            fi
            kubectl logs -f "$POD" -n "$NAMESPACE" > "/tmp/${POD}_logs.txt" 2>&1 &
            pids+=($!)
          done

          kubectl logs -f "$LEADER_POD" -n "$NAMESPACE" | while IFS= read -r line; do
            echo "$line"
            if echo "$line" | grep -q "FAIL_TAG_${{ inputs.config_file_path }}"; then
              exit 1
            fi
          done

      - name: Fetch benchmark results from PVC
        if: always()
        run: |
          set -euo pipefail
          mkdir -p /tmp/benchmark_results
          SRC="/root/.cache/benchmark_results/${{ steps.vars.outputs.benchmark_job_name }}"
          if [ -d "$SRC" ] && [ "$(ls -A "$SRC" 2>/dev/null)" ]; then
            cp -r "$SRC"/. /tmp/benchmark_results/
            rm -rf "${SRC:?}"/*
          else
            echo "Warning: No benchmark results found in PVC at $SRC"
          fi

      - name: Post process
        if: always()
        run: |
          kubectl get pods -n "$NAMESPACE" --ignore-not-found=true
          kubectl delete -f ./lws.yaml --ignore-not-found=true || true

      - name: Collect Ascend logs
        if: always()
        run: |
          set -euo pipefail
          size="${{ inputs.size }}"
          DEST="/tmp/collected-logs"
          PLOG_PATH=/root/ascend/log
          KUBE_LOG_PATH=/var/log
          EXT_LOG_PATH=/external-dp
          for i in $(seq 0 $((size - 1))); do
            if [ "${i}" -eq 0 ]; then
              POD="${LWS_NAME}-0"
            else
              POD="${LWS_NAME}-0-${i}"
            fi
            mkdir -p "${DEST}/node${i}/${PLOG_PATH}" "${DEST}/node${i}/${KUBE_LOG_PATH}" "${DEST}/node${i}/${EXT_LOG_PATH}"
            cp "/tmp/${POD}_logs.txt" "${DEST}/node${i}/${KUBE_LOG_PATH}/" 2>/dev/null || true
            SRC="${LOG_PREFIX}/node_${i}_plogs"
            if [ -d "$SRC" ]; then
              cp -r "$SRC"/. "${DEST}/node${i}/${PLOG_PATH}/" 2>/dev/null || true
            fi
            EXT_SRC="${LOG_PREFIX}/node_${i}_external_dp_logs.tar.gz"
            if [ -f "$EXT_SRC" ]; then
              cp "$EXT_SRC" "${DEST}/node${i}/${EXT_LOG_PATH}/" 2>/dev/null || true
            fi
          done
          tar -czf /tmp/ascend-logs.tar.gz -C /tmp collected-logs

      - name: Upload Ascend logs
        if: always()
        continue-on-error: true
        uses: ascend-gha-runners/artifact/upload@v0.3
        with:
          access_key: ${{ secrets.OBS_ACCESS_KEY }}
          secret_key: ${{ secrets.OBS_SECRET_KEY }}
          name: ${{ inputs.config_file_path }}-external-dp-ascend-logs
          path: /tmp/ascend-logs.tar.gz
          retention-days: 7

      - name: Upload Ascend logs (GitHub Artifacts)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: /tmp/ascend-logs.tar.gz
          retention-days: 7

      - name: Set benchmark artifact timestamp
        if: always()
        id: bench_ts
        run: echo "artifact_ts=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark results
        if: always()
        continue-on-error: true
        uses: ascend-gha-runners/artifact/upload@v0.3
        with:
          access_key: ${{ secrets.OBS_ACCESS_KEY }}
          secret_key: ${{ secrets.OBS_SECRET_KEY }}
          name: nightly-test-external-dp-benchmark-results-${{ inputs.name || inputs.config_file_path }}-${{ steps.bench_ts.outputs.artifact_ts }}
          path: /tmp/benchmark_results/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload benchmark results (GitHub Artifacts)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: nightly-test-external-dp-benchmark-results-${{ steps.vars.outputs.benchmark_job_name }}-${{ steps.bench_ts.outputs.artifact_ts }}
          path: /tmp/benchmark_results/
          if-no-files-found: warn
          retention-days: 90
          compression-level: 0
