name: Verify csrc Build Cache

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/scripts/generate_cache_matrix.py'
      - '.github/workflows/schedule_cache_csrc_build.yaml'
      - '.github/workflows/test_csrc_build_cache.yaml'

defaults:
  run:
    shell: bash -el {0}

jobs:
  validate-generator:
    name: Validate cache matrix generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          python3 -m pip install pyyaml

      - name: Run generate_cache_matrix.py (full matrix)
        run: |
          python3 .github/workflows/scripts/generate_cache_matrix.py \
            | tee /tmp/full_matrix.json

          echo "::group::Full matrix pretty JSON"
          python3 -m json.tool /tmp/full_matrix.json
          echo "::endgroup::"

      - name: Validate full matrix is valid JSON with entries
        run: |
          python3 <<'PY'
          import json

          with open("/tmp/full_matrix.json") as fh:
              data = json.load(fh)

          assert "include" in data, "missing include key"
          assert len(data["include"]) > 0, "empty matrix"

          required = [
              "branch", "branch_normalized", "dockerfile", "image",
              "image_tag", "soc_version", "os_type", "arch", "runner",
          ]
          for entry in data["include"]:
              missing = [k for k in required if k not in entry]
              assert not missing, "entry missing keys: {}".format(missing)
              # Verify image matches consumer CSRC_BUILD_CACHE_IMAGE format
              assert ":" in entry["image"], \
                  "image missing tag: {}".format(entry["image"])

          print("Valid: {} entries".format(len(data["include"])))
          PY

      - name: Run generate_cache_matrix.py (branch-filter)
        run: |
          python3 .github/workflows/scripts/generate_cache_matrix.py \
            --branch-filter main \
            | tee /tmp/filtered_matrix.json

          echo "::group::Filtered matrix pretty JSON"
          python3 -m json.tool /tmp/filtered_matrix.json
          echo "::endgroup::"

      - name: Validate filtered matrix only contains main
        run: |
          python3 <<'PY'
          import json

          with open("/tmp/filtered_matrix.json") as fh:
              data = json.load(fh)

          branches = {e["branch"] for e in data["include"]}
          assert branches == {"main"}, \
              "expected only main, got: {}".format(branches)
          assert len(data["include"]) > 0, "filtered matrix is empty"

          print("Filter valid: {} entries, branches={}".format(
              len(data["include"]), branches))
          PY

      - name: Test --branch-filter with nonexistent branch (must fail)
        run: |
          set +e
          output=$(python3 .github/workflows/scripts/generate_cache_matrix.py \
            --branch-filter __nonexistent__ 2>&1)
          status=$?
          set -e

          echo "Exit status: $status"
          echo "$output"

          if [[ "$status" -eq 0 ]]; then
            echo "::error::Expected --branch-filter __nonexistent__ to fail, but it succeeded"
            exit 1
          fi

          echo "Nonexistent branch filter failed as expected"

      - name: Verify cache key consistency (producer vs consumer)
        run: |
          python3 <<'PY'
          import json

          with open("/tmp/full_matrix.json") as fh:
              data = json.load(fh)

          prefix = "vllm-ascend-build-ninja-v1"
          cache_time = "2026061018"

          for entry in data["include"]:
              bn = entry["branch_normalized"]
              runner = entry["runner"]
              arch = entry["arch"]
              image = entry["image"]

              # Producer key
              producer_key = "{}-{}-{}-{}-{}-{}".format(
                  prefix, bn, runner, arch, image, cache_time)
              assert producer_key.startswith(prefix), \
                  "bad key: {}".format(producer_key)

              # Consumer restore prefix
              restore_prefix = "{}-{}-{}-{}-{}-".format(
                  prefix, bn, runner, arch, image)
              assert restore_prefix.startswith(prefix), \
                  "bad restore prefix: {}".format(restore_prefix)
              assert restore_prefix.endswith("-"), \
                  "restore prefix must end with -: {}".format(restore_prefix)

              # The restore prefix must be a prefix of the producer key
              assert producer_key.startswith(restore_prefix), (
                  "restore prefix {!r} does not match producer key {!r}"
                  .format(restore_prefix, producer_key))

          print("Cache key consistency OK: {} entries checked".format(
              len(data["include"])))
          PY

      - name: Validate normalize_branch function
        run: |
          python3 <<'PY'
          import sys
          sys.path.insert(0, ".github/workflows/scripts")
          import generate_cache_matrix as gcm

          tests = [
              ("main", "main"),
              ("releases/v0.20.2rc", "releases-v0.20.2rc"),
              ("feature/my-branch@v1", "feature-my-branch-v1"),
              ("", "unknown-branch"),
              ("!!!", "unknown-branch"),
          ]
          for inp, expected in tests:
              result = gcm.normalize_branch(inp)
              assert result == expected, \
                  "{!r} -> {!r}, expected {!r}".format(inp, result, expected)
          print("normalize_branch: all OK")
          PY
