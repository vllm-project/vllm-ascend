name: Handle /e2e Command

on:
  repository_dispatch:
    types: [e2e-command]

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  e2e-test:
    name: Run /e2e tests
    runs-on: linux-amd64-cpu-4-hk
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend/act-environments-ubuntu:act-22.04
    outputs:
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      test_groups: ${{ steps.groups.outputs.test_groups }}
      has_tests: ${{ steps.groups.outputs.has_tests }}
      notify_comment_id: ${{ steps.notify.outputs.comment-id }}
      main_commit: ${{ steps.vllm.outputs.main_commit }}
      release_tag: ${{ steps.vllm.outputs.release_tag }}
      main_commit_short: ${{ steps.vllm.outputs.main_commit_short }}
      ascend_short: ${{ steps.ascend_short.outputs.ascend_short }}
      build_matrix: ${{ steps.build-matrix.outputs.build_matrix }}
    steps:
      - name: Install system dependencies
        run: |
          sudo mkdir -p -m 755 /etc/apt/keyrings
          curl -sL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -y
          sudo apt-get install gh -y

      - name: Check user authorization
        id: auth
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          ACTOR='${{ github.event.client_payload.github.payload.comment.user.login }}'
          PR_AUTHOR='${{ github.event.client_payload.pull_request.user.login }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          if [ "$ACTOR" = "$PR_AUTHOR" ]; then
            echo "User $ACTOR is the PR author, authorized."
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            ROLE_NAME=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.role_name' 2>/dev/null || true)
            case "$ROLE_NAME" in
              triage|write|maintain|admin)
                echo "User $ACTOR has $ROLE_NAME role, authorized."
                echo "authorized=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::User $ACTOR is not the PR author and does not have triage+ permission."
                echo "authorized=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

      - name: Post workflow URL
        id: notify
        if: steps.auth.outputs.authorized == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: e2e command triggered. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          reactions: rocket

      - name: Post unauthorized comment
        if: steps.auth.outputs.authorized == 'false'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: e2e command failed: you do not have permission. Only the PR author or users with triage+ permission can trigger /e2e.
          reactions: confused

      - name: Fail if unauthorized
        if: steps.auth.outputs.authorized == 'false'
        run: exit 1

      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Read verified vLLM refs
        id: vllm
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
            echo "main_commit_short=$(echo "$main_commit" | cut -c1-7)"
          } >> "$GITHUB_OUTPUT"

      - name: Compute ascend short hash
        id: ascend_short
        run: |
          echo "ascend_short=$(echo '${{ github.event.client_payload.pull_request.head.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Resolve PR info and test names
        id: resolve
        run: |
          PR_SHA='${{ github.event.client_payload.pull_request.head.sha }}'
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"

          ALL_ARGS="${{ github.event.client_payload.slash_command.args.all }}"
          echo "all_args=$ALL_ARGS" >> "$GITHUB_OUTPUT"

      - name: Validate test paths
        id: validate
        env:
          ALL_ARGS: ${{ steps.resolve.outputs.all_args }}
        run: |
          TESTS=$(echo "$ALL_ARGS" | tr '\n' ' ')
          if [ -z "$TESTS" ]; then
            echo "::error::No test paths provided. Usage: /e2e <test-path-1> [test-path-2] ..."
            exit 1
          fi
          for TEST in $TESTS; do
            if [[ ! "$TEST" =~ ^tests/e2e/pull_request/[^/]+/ ]]; then
              echo "::error::Unsupported test path: $TEST"
              echo "Only tests under tests/e2e/pull_request/<subdir>/ are supported."
              exit 1
            fi
          done
          echo "All test paths are valid."
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Categorize tests by runner
        id: groups
        run: |
          pip install regex pyyaml
          TESTS=$(echo "${{ steps.validate.outputs.tests }}" | tr '\n' ' ')
          read -ra TEST_ARRAY <<< "$TESTS"
          python3 .github/workflows/scripts/select_tests.py \
            --explicit-e2e-tests "${TEST_ARRAY[@]}"

      - name: Fail if no valid tests
        if: steps.groups.outputs.has_tests != 'true'
        run: |
          echo "::error::No valid test paths matched. Please verify the paths exist and try again."
          exit 1

      - name: Generate build matrix
        id: build-matrix
        env:
          TEST_GROUPS: ${{ steps.groups.outputs.test_groups }}
          MAIN_COMMIT: ${{ steps.vllm.outputs.main_commit }}
          MAIN_COMMIT_SHORT: ${{ steps.vllm.outputs.main_commit_short }}
          RELEASE_TAG: ${{ steps.vllm.outputs.release_tag }}
        run: |
          python3 - <<'PY'
          import json, os, sys

          raw = os.environ.get("TEST_GROUPS", "[]")
          try:
              test_groups = json.loads(raw)
          except (json.JSONDecodeError, TypeError):
              test_groups = []

          main_commit = os.environ["MAIN_COMMIT"]
          main_commit_short = os.environ["MAIN_COMMIT_SHORT"]
          release_tag = os.environ["RELEASE_TAG"]

          cfg = {
              "a2":   {"cann_tag": "9.0.0-910b-ubuntu22.04-py3.12",
                       "soc": "ascend910b1",    "arch": "arm64",
                       "mode": "device",        "runner": "linux-arm64-cpu-16"},
              "a3":   {"cann_tag": "9.0.0-a3-ubuntu22.04-py3.12",
                       "soc": "ascend910_9391",  "arch": "arm64",
                       "mode": "device",        "runner": "linux-arm64-cpu-16"},
              "310p": {"cann_tag": "9.1.0-beta.1-310p-ubuntu22.04-py3.12",
                       "soc": "ascend310p1",     "arch": "arm64",
                       "mode": "device",        "runner": "linux-arm64-cpu-16"},
              "cpu":  {"cann_tag": "9.0.0-910b-ubuntu22.04-py3.12",
                       "soc": "ascend910b1",    "arch": "amd64",
                       "mode": "nodevice",      "runner": "linux-amd64-cpu-16-hk"},
          }

          npu_types = sorted({g["npu_type"] for g in test_groups
                              if g.get("npu_type") in cfg})
          if not npu_types:
              print("build_matrix=[]")
              sys.exit(0)

          vllm_versions = [
              (main_commit, main_commit_short),
              (release_tag, release_tag),
          ]

          matrix = []
          for nt in npu_types:
              c = cfg[nt]
              for ver, short in vllm_versions:
                  matrix.append({"npu_type": nt, **c,
                                  "vllm_version": ver, "vllm_short": short})

          print(f"build_matrix={json.dumps(matrix)}")
          PY

  trigger-build-image:
    name: Build test images
    needs: [e2e-test]
    if: ${{ needs.e2e-test.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_build_test_image.yaml
    with:
      build_matrix: ${{ needs.e2e-test.outputs.build_matrix }}
      ascend_ref: ${{ needs.e2e-test.outputs.pr_sha }}
      quay_temp_username: ${{ vars.QUAY_TEMP_USERNAME }}
    secrets:
      QUAY_TEMP_PASSWORD: ${{ secrets.QUAY_TEMP_PASSWORD }}

  trigger-selected-tests:
    name: e2e-comment (${{ matrix.vllm_version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - vllm_version: ${{ needs.e2e-test.outputs.main_commit }}
            vllm_short: ${{ needs.e2e-test.outputs.main_commit_short }}
          - vllm_version: ${{ needs.e2e-test.outputs.release_tag }}
            vllm_short: ${{ needs.e2e-test.outputs.release_tag }}
    needs: [e2e-test, trigger-build-image]
    if: ${{ needs.e2e-test.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      vllm_short: ${{ matrix.vllm_short }}
      ascend_short: ${{ needs.e2e-test.outputs.ascend_short }}
      ref: ${{ needs.e2e-test.outputs.pr_sha }}
      test_groups: ${{ needs.e2e-test.outputs.test_groups }}

  report:
    name: Report result
    needs: [e2e-test, trigger-selected-tests]
    if: always() && needs.e2e-test.result == 'success' && needs.e2e-test.outputs.notify_comment_id != ''
    runs-on: linux-amd64-cpu-2-hk
    steps:
      - name: Update comment with result
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ needs.e2e-test.outputs.notify_comment_id }}
          body: |
            [Bot]: e2e command ${{ (needs.trigger-selected-tests.result == 'success' || needs.trigger-selected-tests.result == 'skipped') && 'completed successfully' || 'failed' }}.
          reactions: ${{ (needs.trigger-selected-tests.result == 'success' || needs.trigger-selected-tests.result == 'skipped') && 'hooray' || 'confused' }}
