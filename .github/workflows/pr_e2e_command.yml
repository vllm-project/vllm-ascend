name: Handle /e2e Command

on:
  repository_dispatch:
    types: [e2e-command]

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  e2e-test:
    name: Run /e2e tests
    runs-on: ubuntu-latest
    outputs:
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      test_groups: ${{ steps.groups.outputs.test_groups }}
      has_tests: ${{ steps.groups.outputs.has_tests }}
      vllm_versions: ${{ steps.resolve.outputs.vllm_versions }}
      notify_comment_id: ${{ steps.notify.outputs.comment-id }}
    steps:
      - name: Check user authorization
        id: auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTOR='${{ github.event.client_payload.github.payload.comment.user.login }}'
          PR_AUTHOR='${{ github.event.client_payload.pull_request.user.login }}'
          REPO='${{ github.event.client_payload.github.payload.repository.full_name }}'

          if [ "$ACTOR" = "$PR_AUTHOR" ]; then
            echo "User $ACTOR is the PR author, authorized."
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            PERMISSION=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission')
            case "$PERMISSION" in
              triage|write|maintain|admin)
                echo "User $ACTOR has $PERMISSION permission, authorized."
                echo "authorized=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "::error::User $ACTOR is not the PR author and does not have triage+ permission."
                echo "authorized=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          fi

      - name: Post workflow URL
        id: notify
        if: steps.auth.outputs.authorized == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: e2e command triggered. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          reactions: rocket

      - name: Post unauthorized comment
        if: steps.auth.outputs.authorized == 'false'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ github.event.client_payload.github.payload.comment.id }}
          body: |
            [Bot]: e2e command failed: you do not have permission. Only the PR author or users with triage+ permission can trigger /e2e.
          reactions: confused

      - name: Fail if unauthorized
        if: steps.auth.outputs.authorized == 'false'
        run: exit 1

      - name: Checkout repo
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha }}
          fetch-depth: 1

      - name: Read verified vLLM refs
        id: vllm
        if: steps.auth.outputs.authorized == 'true'
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve PR info and test names
        id: resolve
        if: steps.auth.outputs.authorized == 'true'
        run: |
          PR_SHA='${{ github.event.client_payload.pull_request.head.sha }}'
          echo "pr_sha=$PR_SHA" >> "$GITHUB_OUTPUT"

          ALL_ARGS="${{ github.event.client_payload.slash_command.args.all }}"

          DEFAULT_VLLM_VERSIONS="[\"${{ steps.vllm.outputs.main_commit }}\",\"${{ steps.vllm.outputs.release_tag }}\"]"
          VLLM_VERSIONS="$DEFAULT_VLLM_VERSIONS"
          CLEAN_ARGS=""
          NEXT_IS_VLLM=0
          VLLM_FLAG_COUNT=0
          for WORD in $(echo "$ALL_ARGS" | tr '\n' ' ' | xargs); do
            if [ "$NEXT_IS_VLLM" = "1" ]; then
              VLLM_VERSIONS=$(printf '%s' "$WORD" | python3 -c "import sys,json; print(json.dumps([v for v in sys.stdin.read().strip().split(',') if v]))")
              NEXT_IS_VLLM=0
            elif [ "$WORD" = "--vllm" ]; then
              NEXT_IS_VLLM=1
              VLLM_FLAG_COUNT=$((VLLM_FLAG_COUNT + 1))
              if [ "$VLLM_FLAG_COUNT" -gt 1 ]; then
                echo "::error::--vllm can only be specified once."
                exit 1
              fi
            else
              CLEAN_ARGS="$CLEAN_ARGS $WORD"
            fi
          done

          if [ "$NEXT_IS_VLLM" = "1" ]; then
            echo "::error::--vllm requires a value."
            exit 1
          fi

          CLEAN_ARGS=$(echo "$CLEAN_ARGS" | xargs)
          echo "all_args=$CLEAN_ARGS" >> "$GITHUB_OUTPUT"
          echo "vllm_versions=$VLLM_VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Validate test paths
        id: validate
        if: steps.auth.outputs.authorized == 'true'
        env:
          ALL_ARGS: ${{ steps.resolve.outputs.all_args }}
        run: |
          TESTS=$(echo "$ALL_ARGS" | tr '\n' ' ' | xargs)
          if [ -z "$TESTS" ]; then
            echo "::error::No test paths provided. Usage: /e2e <test-path-1> [test-path-2] ..."
            exit 1
          fi
          for TEST in $TESTS; do
            if [[ ! "$TEST" =~ ^tests/e2e/pull_request/[^/]+/ ]]; then
              echo "::error::Unsupported test path: $TEST"
              echo "Only tests under tests/e2e/pull_request/<subdir>/ are supported."
              exit 1
            fi
          done
          echo "All test paths are valid."
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

      - name: Categorize tests by runner
        id: groups
        if: steps.auth.outputs.authorized == 'true'
        run: |
          pip install regex
          TESTS=$(echo "${{ steps.validate.outputs.tests }}" | tr '\n' ' ')
          read -ra TEST_ARRAY <<< "$TESTS"
          python3 .github/workflows/scripts/select_tests.py \
            --changed-files "${TEST_ARRAY[@]}"

  trigger-selected-tests:
    name: e2e-comment (${{ matrix.vllm_version }})
    strategy:
      fail-fast: false
      matrix:
        vllm_version: ${{ fromJSON(needs.e2e-test.outputs.vllm_versions) }}
    needs: [e2e-test]
    if: ${{ needs.e2e-test.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ needs.e2e-test.outputs.pr_sha }}
      test_groups: ${{ needs.e2e-test.outputs.test_groups }}

  report:
    name: Report result
    needs: [e2e-test, trigger-selected-tests]
    if: always() && needs.e2e-test.result == 'success' && needs.e2e-test.outputs.notify_comment_id != ''
    runs-on: ubuntu-latest
    steps:
      - name: Update comment with result
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ github.event.client_payload.github.payload.repository.full_name }}
          comment-id: ${{ needs.e2e-test.outputs.notify_comment_id }}
          body: |
            [Bot]: e2e command ${{ (needs.trigger-selected-tests.result == 'success' && 'completed successfully') || (needs.trigger-selected-tests.result == 'skipped' && 'found no tests to run (please check the test paths)') || (needs.trigger-selected-tests.result == 'cancelled' && 'was cancelled') || 'failed' }}.
          reactions: ${{ (needs.trigger-selected-tests.result == 'success' && 'hooray') || 'confused' }}