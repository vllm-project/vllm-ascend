name: "PR Review Bot"
on:
  pull_request_target:
    types: [opened, reopened, edited]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:

    runs-on: linux-amd64-cpu-2-hk
    if: |
      github.event.pull_request.state == 'open' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        (github.event.action == 'edited' && (github.event.changes.title || github.event.changes.body))
      )

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pyyaml regex

      # Step 1: Review the PR description with the LLM → review_result.json
      - name: Call LLM
        id: llm
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python .github/workflows/scripts/robot/call_llm.py \
            --kind pr \
            --output review_result.json

      # Step 2: Post comment if description incomplete → label_actions.json
      - name: Post handler
        id: post
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          NEED_DETAIL_LABEL: ${{ vars.PR_DESC_CHECK_NEED_DETAIL_LABEL || 'need-detail-desc' }}
        run: |
          python .github/workflows/scripts/robot/handle_review.py \
            --input review_result.json \
            --label-output label_actions.json \
            --kind pr

      # Step 3: Add or remove the need-detail-desc label
      - name: Manage label
        id: label
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/workflows/scripts/robot/manage_labels.py
