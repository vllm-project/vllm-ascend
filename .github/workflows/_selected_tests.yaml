name: Selected Tests

on:
  workflow_call:
    inputs:
      vllm:
        type: string
        required: true
        description: 'The vllm commit hash or tag to test.'
      test_groups:
        type: string
        required: true
        description: 'JSON array of test groups from select_tests.py'
      ref:
        type: string
        required: false
        default: ''
        description: 'The vllm-ascend ref to test.'
      upload_timing:
        type: boolean
        required: false
        default: false
        description: 'Upload test_timing_data.json as artifact'
      continue_on_error:
        type: boolean
        required: false
        default: false
        description: 'Continue running the job even if tests fail'
      vllm_short:
        type: string
        required: true
        description: 'Short (7-char) vLLM commit/tag for image tag construction.'
      ascend_short:
        type: string
        required: true
        description: 'Short (7-char) vllm-ascend ref for image tag construction.'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}
    working-directory: /vllm-workspace/vllm-ascend

permissions:
  contents: read
  pull-requests: write

jobs:
  selected-tests:
    name: ${{ matrix.group.npu_type }}-${{ matrix.group.num_npus }} card-${{ matrix.group.partition && format('(part {0})', matrix.group.partition) || '' }}
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(inputs.test_groups) }}
    runs-on: ${{ matrix.group.runner }}
    container:
      image: quay.io/atlas-ci/vllm-atlas-temp:vllm-ascend-${{ inputs.vllm_short }}-${{ inputs.ascend_short }}-${{ matrix.group.npu_type }}-${{ matrix.group.npu_type == 'cpu' && 'amd64' || 'arm64' }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        HF_HUB_OFFLINE: 1
        MAX_JOBS: 4
    steps:
      - name: Check NPU availability
        if: ${{ matrix.group.npu_type != 'cpu' }}
        run: |
          npu-smi info

      - name: Verify required AscendC custom ops are registered (310p)
        if: ${{ matrix.group.npu_type == '310p' }}
        run: |
          python - <<'PY'
          import sys, torch
          import vllm_ascend.vllm_ascend_C  # noqa: F401
          ops = torch.ops._C_ascend
          missing = [n for n in ("chunk_gated_delta_rule_fwd_h", "chunk_fwd_o") if not hasattr(ops, n)]
          if missing:
              print(f"::error::Missing AscendC ops after install: {missing}. "
                    f"Cache contents are stale or build skipped registration.", file=sys.stderr)
              sys.exit(1)
          print("AscendC chunk-gdr ops registered:",
                [n for n in ("chunk_gated_delta_rule_fwd_h", "chunk_fwd_o") if hasattr(ops, n)])
          PY

      - name: Uninstall Triton for 310P tests
        if: ${{ matrix.group.npu_type != 'cpu' && matrix.group.npu_type == '310p' }}
        run: |
          pip uninstall -y triton-ascend triton

      - name: Run selected tests with device
        if: ${{ matrix.group.npu_type != 'cpu' }}
        continue-on-error: ${{ inputs.continue_on_error }}
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
        run: |
          . /usr/local/Ascend/ascend-toolkit/set_env.sh
          TIMING_FLAG=""
          if [ "${{ inputs.upload_timing }}" = "true" ]; then
            TIMING_FLAG="--timing"
          fi
          .github/workflows/scripts/run_selected_tests.sh \
            "${{ matrix.group.npu_type }}" \
            "${{ matrix.group.num_npus }}" \
            "with-device" \
            ${TIMING_FLAG} \
            ${{ matrix.group.tests }}

      - name: Run selected tests without device
        if: ${{ matrix.group.npu_type == 'cpu' }}
        continue-on-error: ${{ inputs.continue_on_error }}
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          TORCH_DEVICE_BACKEND_AUTOLOAD: 0
        run: |
          .github/workflows/scripts/run_selected_tests.sh \
            "${{ matrix.group.npu_type }}" \
            "${{ matrix.group.num_npus }}" \
            "without-device" \
            ${{ matrix.group.tests }}

      - name: Upload timing data
        if: ${{ inputs.upload_timing && matrix.group.npu_type != 'cpu' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: timing-data-${{ matrix.group.npu_type }}-${{ matrix.group.num_npus }}card-${{ matrix.group.partition }}
          path: ${{ runner.temp }}/selected-tests-*/test_timing_data.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload selected test logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: selected-test-logs-vllm-${{ inputs.vllm }}-${{ matrix.group.npu_type }}-${{ matrix.group.num_npus }}card
          path: ${{ runner.temp }}/selected-tests-*
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 0