name: "CodeQL Analysis"

on:
  push:
    branches: [ "feature/codeql" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    # 使用 VA 仓同款自建 ARM 运行器
    runs-on: linux-aarch64-a2b3-0 
    
    # 指定华为昇腾 CI 专用容器
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
      options: --user root # 确保有权限安装插件

    steps:
      - name: Checkout
        uses: actions/checkout@v6 # 沿用 VA 仓推荐版本

      # 设置代理（解决国内容器拉取 GitHub 资源慢的问题）
      - name: Setup git proxy
        run: |
          git config --global url."https://gh-proxy.test.osinfra.cn/https://github.com/".insteadOf https://github.com/

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'cpp, python'

      # 此时环境里已经自带了 torch, pybind11 和 CANN
      - name: C++ Build (CMake)
        shell: bash -el {0} # 激活容器内的环境变量
        run: |
          mkdir build && cd build
          cmake .. -DENABLE_ASCEND=ON # 开启昇腾适配
          make -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3