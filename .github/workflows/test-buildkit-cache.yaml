name: test-buildkit-cache

on:
  workflow_dispatch:

env:
  BUILDKITD_ADDR: tcp://buildkitd-service.buildkitd:1234

jobs:
  cache-test:
    runs-on: linux-aarch64-cpu-2-buildkit-gy006
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend/act-environments-ubuntu:act-22.04
    steps:
      - name: Dump client ca.pem full content
        run: |
          echo "=== Full client ca.pem ==="
          cat "${DOCKER_CONFIG}/ca.pem"
          echo "=== END ==="
          echo ""
          echo "=== byte count ==="
          wc -c "${DOCKER_CONFIG}/ca.pem"
          echo ""
          echo "=== cert details if openssl available ==="
          openssl x509 -in "${DOCKER_CONFIG}/ca.pem" -noout -subject -issuer -serial -fingerprint -sha256 2>&1 || echo "openssl not available"
