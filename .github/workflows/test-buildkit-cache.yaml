name: test-buildkit-cache

on:
  workflow_dispatch:

env:
  BUILDKITD_ADDR: tcp://buildkitd-service.buildkitd.svc.cluster.local:1234

jobs:
  cache-test:
    runs-on: linux-aarch64-cpu-2-buildkit-gy006
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend/act-environments-ubuntu:act-22.04
    steps:
      - name: Setup context
        run: |
          mkdir -p /tmp/ctx
          cat > /tmp/ctx/Dockerfile <<'DOCKERFILE'
          FROM quay.io/ascend/cann:9.0.0-910b-openeuler24.03-py3.12
          RUN echo cache-probe > /tmp/cache-probe-marker
          DOCKERFILE

      - name: Test buildctl with FQDN (should match NO_PROXY)
        run: |
          set -e
          echo "BUILDKITD_ADDR=${BUILDKITD_ADDR}"
          echo "HTTP_PROXY=${HTTP_PROXY}"
          echo "NO_PROXY=${NO_PROXY}"
          buildctl \
            --addr "${BUILDKITD_ADDR}" \
            --tlscacert "${DOCKER_CONFIG}/ca.pem" \
            --tlscert  "${DOCKER_CONFIG}/cert.pem" \
            --tlskey   "${DOCKER_CONFIG}/key.pem" \
            --tlsservername buildkitd-service.buildkitd \
            debug workers 2>&1
          echo "SUCCESS"
