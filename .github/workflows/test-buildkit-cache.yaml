name: test-buildkit-cache

on:
  workflow_dispatch:

env:
  BUILDKITD_ADDR: tcp://buildkitd-service.buildkitd:1234

jobs:
  cache-test:
    runs-on: linux-aarch64-cpu-2-buildkit-gy006
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/vllm-ascend/act-environments-ubuntu:act-22.04
    steps:
      - name: Setup context
        run: |
          mkdir -p /tmp/ctx
          cat > /tmp/ctx/Dockerfile <<'DOCKERFILE'
          FROM quay.io/ascend/cann:9.0.0-910b-openeuler24.03-py3.12
          RUN echo cache-probe > /tmp/cache-probe-marker
          DOCKERFILE

      - name: Test with buildctl v0.24.0 (matching server)
        run: |
          set -e
          echo "=== Download buildctl v0.24.0 (matching buildkitd server) ==="
          mkdir -p /tmp/buildctl-v0.24
          curl -fsSL "https://gh-proxy.test.osinfra.cn/https://github.com/moby/buildkit/releases/download/v0.24.0/buildkit-v0.24.0.linux-arm64.tar.gz" -o /tmp/buildctl.tar.gz
          tar -xzf /tmp/buildctl.tar.gz -C /tmp/buildctl-v0.24
          /tmp/buildctl-v0.24/bin/buildctl --version

          echo "=== Test connectivity ==="
          /tmp/buildctl-v0.24/bin/buildctl \
            --addr "${BUILDKITD_ADDR}" \
            --tlscacert "${DOCKER_CONFIG}/ca.pem" \
            --tlscert  "${DOCKER_CONFIG}/cert.pem" \
            --tlskey   "${DOCKER_CONFIG}/key.pem" \
            debug workers 2>&1
          echo "exit=$?"

      - name: Alternative - no client cert, CA only
        run: |
          set +e
          echo "=== Test buildctl v0.29.0 without client cert (server auth only) ==="
          buildctl \
            --addr "${BUILDKITD_ADDR}" \
            --tlscacert "${DOCKER_CONFIG}/ca.pem" \
            debug workers 2>&1
          echo "exit=$?"
        continue-on-error: true

      - name: Alternative - no TLS flags at all
        run: |
          set +e
          echo "=== Test buildctl v0.29.0 with no TLS flags ==="
          buildctl \
            --addr "${BUILDKITD_ADDR}" \
            debug workers 2>&1
          echo "exit=$?"
        continue-on-error: true
