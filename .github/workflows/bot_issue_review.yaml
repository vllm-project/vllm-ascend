name: "Issue Review Bot"
on:
  issues:
    types: [opened, edited]

concurrency:
  group: issue-review-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.state == 'open' &&
      (
        github.event.action == 'opened' ||
        github.event.changes.title ||
        github.event.changes.body
      ) &&
      (
        startsWith(github.event.issue.title, '[Bug]:') ||
        startsWith(github.event.issue.title, '[Installation]:') ||
        startsWith(github.event.issue.title, '[Install]:') ||
        startsWith(github.event.issue.title, '[Usage]:') ||
        startsWith(github.event.issue.title, '[Doc]:') ||
        startsWith(github.event.issue.title, '[Misc]:') ||
        startsWith(github.event.issue.title, '[Feature]:') ||
        startsWith(github.event.issue.title, '[Perf]:')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pyyaml

      # Step 1: Extract issue type from title → issue_type.txt
      - name: Extract input
        id: extract
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python .github/workflows/scripts/robot/extract_input.py --output issue_type.txt

      # Step 2: Load the matching issue template → template.txt
      - name: Prepare template
        id: template
        if: success()
        run: python .github/workflows/scripts/robot/prepare_template.py --input issue_type.txt --output template.txt

      # Step 3: Load the system prompt → system_prompt.txt
      - name: Prepare system prompt
        id: sysprompt
        if: success()
        run: python .github/workflows/scripts/robot/prepare_system_prompt.py --output system_prompt.txt

      # Step 4: Call LLM for description completeness check → review_result.json
      - name: Call LLM
        id: llm
        if: success()
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
          VLLM_BASE_URL: ${{ secrets.VLLM_BASE_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/workflows/scripts/robot/call_llm.py \
            --system-prompt system_prompt.txt \
            --template template.txt \
            --type-key issue_type.txt \
            --output review_result.json

      # Step 5: Post comment if description incomplete → label_actions.json
      - name: Post handler
        id: post
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          NEED_DETAIL_LABEL: ${{ vars.ISSUE_DESCRIPTION_CHECK_NEED_DETAIL_LABEL || 'need-detail-desc' }}
        run: |
          python .github/workflows/scripts/robot/handle_review.py \
            --input review_result.json \
            --label-output label_actions.json

      # Step 6: Add or remove the need-detail-desc label
      - name: Manage label
        id: label
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: python .github/workflows/scripts/robot/manage_labels.py
