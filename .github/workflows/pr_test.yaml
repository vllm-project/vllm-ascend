name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-select-tests:
    if: ${{ github.event.action != 'labeled' || github.event.label.name == 'ready' }}
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    outputs:
      has_tests: ${{ steps.filter-test-groups.outputs.has_tests || steps.scope.outputs.has_tests || steps.noop.outputs.has_tests }}
      test_groups: ${{ steps.filter-test-groups.outputs.test_groups || steps.scope.outputs.test_groups || steps.noop.outputs.test_groups }}
      matched_modules: ${{ steps.scope.outputs.matched_modules || steps.noop.outputs.matched_modules }}
      main_commit: ${{ steps.vllm.outputs.main_commit }}
      release_tag: ${{ steps.vllm.outputs.release_tag }}
      a2_csrc_need_build: ${{ steps.a2-csrc-cache-plan.outputs.need_build }}
      a2_csrc_cache_key: ${{ steps.csrc-cache-keys.outputs.a2_cache_key }}
      a3_csrc_need_build: ${{ steps.a3-csrc-cache-plan.outputs.need_build }}
      a3_csrc_cache_key: ${{ steps.csrc-cache-keys.outputs.a3_cache_key }}
      csrc_310p_need_build: ${{ steps.csrc-310p-cache-plan.outputs.need_build }}
      csrc_310p_cache_key: ${{ steps.csrc-cache-keys.outputs.cache_310p_key }}
    steps:
      - name: Validate PR title prefix
        run: |
          PR_TITLE=$(curl -sSf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])") || {
              echo "::error::Failed to fetch PR title from GitHub API"
              exit 1
            }

          if [ -z "$PR_TITLE" ]; then
            echo "::error::PR title cannot be empty"
            exit 1
          fi

          echo "Checking PR title: $PR_TITLE"

          VALID_PREFIXES='\[(BugFix|Performance|Test|CI|Feature|Doc|Misc|Community|Refactor)\]'

          if ! echo "$PR_TITLE" | grep -iqE "$VALID_PREFIXES"; then
            echo "::error::PR title must contain one of the following prefixes: [BugFix], [Performance], [Test], [CI], [Feature], [Doc], [Misc], [Community], [Refactor]"
            echo "::error::Example: '[Feature] Add new optimization pass' or 'Add new feature [Feature]'"
            exit 1
          fi

          echo "✓ PR title prefix is valid"

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read verified vLLM refs
        id: vllm
        run: |
          main_commit="$(tr -d '[:space:]' < .github/vllm-main-verified.commit)"
          release_tag="$(tr -d '[:space:]' < .github/vllm-release-tag.commit)"
          [[ "${main_commit}" =~ ^[0-9a-f]{7,40}$ ]] || {
            echo "::error file=.github/vllm-main-verified.commit::invalid vLLM main commit: ${main_commit}"
            exit 1
          }
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error file=.github/vllm-release-tag.commit::invalid vLLM release tag: ${release_tag}"
            exit 1
          }
          {
            echo "main_commit=${main_commit}"
            echo "release_tag=${release_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: cp problem matchers
        run: |
          cp .github/workflows/matchers/actionlint.json "$RUNNER_TEMP/actionlint.json"
          cp .github/workflows/matchers/markdownlint.json "$RUNNER_TEMP/markdownlint.json"
          cp .github/workflows/matchers/mypy.json "$RUNNER_TEMP/mypy.json"

      - run: echo "::add-matcher::$RUNNER_TEMP/actionlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/markdownlint.json"
      - run: echo "::add-matcher::$RUNNER_TEMP/mypy.json"

      - name: Checkout vllm-project/vllm repo
        if: ${{ false }}
        uses: actions/checkout@v7
        with:
          repository: vllm-project/vllm
          path: ./vllm-empty
          ref: ${{ steps.vllm.outputs.main_commit }}

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            lint_tracker:
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'requirements-lint.txt'
            src:
              - 'vllm_ascend/**'
              - 'setup.py'
              - 'csrc/**'
              - 'packages.txt'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'pyproject.toml'
              - 'cmake/**'
              - '.github/workflows/pr_test.yaml'
              - '.github/workflows/_selected_tests.yaml'
              - '.github/workflows/scripts/select_tests.py'
              - '.github/workflows/scripts/run_selected_tests.sh'
              - '.github/workflows/scripts/test_config.yaml'
              - '.github/workflows/scripts/runner_label.json'
              - 'tests/**'
              - 'tools/**'
              - 'CMakeLists.txt'

      - name: Install vllm-ascend dev (conditional)
        if: ${{ false }}
        env:
          UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
          UV_INDEX_STRATEGY: unsafe-best-match
          UV_NO_CACHE: 1
          UV_SYSTEM_PYTHON: 1
        run: |
          pip install uv
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          pip install uc-manager
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run pre-commit
        if: ${{ false }}
        env:
          PRE_COMMIT_HOME: /tmp/pre-commit-cache
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          pre-commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Run mypy
        if: ${{ false }}
        run: |
          PYTHONPATH="$PYTHONPATH:$(pwd)/vllm-empty"
          export PYTHONPATH
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          for python_version in "3.10" "3.11" "3.12"; do
            echo "============================"
            tools/mypy.sh 1 "$python_version"
            echo "============================"
          done

      - name: Validate test coverage config
        run: |
          pip install pyyaml
          python3 .github/workflows/scripts/coverage.py

      - name: Select tests based on changed files
        id: scope
        if: steps.filter.outputs.src == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin ${{ github.base_ref }}
          pip install regex
          python3 .github/workflows/scripts/select_tests.py \
            --diff-base origin/${{ github.base_ref }}

      - name: Keep only fractional-card test groups
        id: filter-test-groups
        if: steps.scope.outputs.has_tests == 'true'
        env:
          TEST_GROUPS: ${{ steps.scope.outputs.test_groups }}
        run: |
          python3 - <<'PY'
          import json
          import os

          groups = json.loads(os.environ["TEST_GROUPS"])
          # Enable after vNPU validation:
          # allowed_types = {"cpu", "a2", "a2_half", "a2_quarter", "a3", "310p"}
          allowed_types = {"a2_half", "a2_quarter"}
          filtered = [group for group in groups if group["npu_type"] in allowed_types]
          selected_types = {group["npu_type"] for group in filtered}

          outputs = {
              "test_groups": json.dumps(filtered, separators=(",", ":")),
              "has_tests": bool(filtered),
              "has_a2": bool(selected_types & {"a2", "a2_half", "a2_quarter"}),
              "has_a3": "a3" in selected_types,
              "has_310p": "310p" in selected_types,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for name, value in outputs.items():
                  if isinstance(value, bool):
                      value = str(value).lower()
                  print(f"{name}={value}", file=output)
          PY

      - name: Calculate csrc cache keys
        id: csrc-cache-keys
        if: steps.filter-test-groups.outputs.has_tests == 'true'
        run: |
          BUILD_HASH=$(find \
            ./csrc \
            ./cmake \
            ./setup.py \
            ./CMakeLists.txt \
            ./pyproject.toml \
            ./packages.txt \
            ./requirements.txt \
            ./requirements-dev.txt \
            ./vllm_ascend/envs.py \
            -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          {
            echo "a2_cache_key=vllm-ascend-build-v2-ARM64-9.0.1-910b-ubuntu22.04-py3.12-ascend910b1-${BUILD_HASH}"
            echo "a3_cache_key=vllm-ascend-build-v2-ARM64-9.0.1-a3-ubuntu22.04-py3.12-ascend910_9391-${BUILD_HASH}"
            echo "cache_310p_key=vllm-ascend-build-v2-ARM64-9.1.0-beta.1-310p-ubuntu22.04-py3.12-ascend310p1-${BUILD_HASH}"
          } >> "$GITHUB_OUTPUT"

      # A2 full-card and vNPU tests use the same image and csrc artifact.
      - name: Look up A2 csrc cache
        id: lookup-a2-csrc
        if: steps.filter-test-groups.outputs.has_a2 == 'true'
        uses: runs-on/cache/restore@v5
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: ${{ steps.csrc-cache-keys.outputs.a2_cache_key }}
          lookup-only: true

      - name: Plan A2 csrc build
        id: a2-csrc-cache-plan
        if: steps.filter-test-groups.outputs.has_a2 == 'true'
        env:
          CACHE_HIT: ${{ steps.lookup-a2-csrc.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          fi

      # Enable these lookups together with the full A3/310P test matrix.
      - name: Look up A3 csrc cache
        id: lookup-a3-csrc
        if: ${{ false && steps.filter-test-groups.outputs.has_a3 == 'true' }}
        uses: runs-on/cache/restore@v5
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: ${{ steps.csrc-cache-keys.outputs.a3_cache_key }}
          lookup-only: true

      - name: Plan A3 csrc build
        id: a3-csrc-cache-plan
        if: ${{ false && steps.filter-test-groups.outputs.has_a3 == 'true' }}
        env:
          CACHE_HIT: ${{ steps.lookup-a3-csrc.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Look up 310P csrc cache
        id: lookup-310p-csrc
        if: ${{ false && steps.filter-test-groups.outputs.has_310p == 'true' }}
        uses: runs-on/cache/restore@v5
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: ${{ steps.csrc-cache-keys.outputs.cache_310p_key }}
          lookup-only: true

      - name: Plan 310P csrc build
        id: csrc-310p-cache-plan
        if: ${{ false && steps.filter-test-groups.outputs.has_310p == 'true' }}
        env:
          CACHE_HIT: ${{ steps.lookup-310p-csrc.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" = "true" ]; then
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set no-tests output when source paths unchanged
        id: noop
        if: steps.filter.outputs.src != 'true'
        run: |
          {
            echo "has_tests=false"
            echo "test_groups=[]"
            echo "matched_modules="
          } >> "$GITHUB_OUTPUT"

  build-a2-csrc-cache:
    needs: lint-and-select-tests
    if: ${{ needs.lint-and-select-tests.outputs.a2_csrc_need_build == 'true' }}
    uses: ./.github/workflows/push_build_csrc_cache.yaml
    with:
      ref: ${{ github.sha }}
      cache_name: a2
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-910b-ubuntu22.04-py3.12
      soc_version: ascend910b1
      cache_key: ${{ needs.lint-and-select-tests.outputs.a2_csrc_cache_key }}

  # Enable these jobs together with the full A3/310P test matrix.
  build-a3-csrc-cache:
    needs: lint-and-select-tests
    if: ${{ false && needs.lint-and-select-tests.outputs.a3_csrc_need_build == 'true' }}
    uses: ./.github/workflows/push_build_csrc_cache.yaml
    with:
      ref: ${{ github.sha }}
      cache_name: a3
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.1-a3-ubuntu22.04-py3.12
      soc_version: ascend910_9391
      cache_key: ${{ needs.lint-and-select-tests.outputs.a3_csrc_cache_key }}

  build-310p-csrc-cache:
    needs: lint-and-select-tests
    if: ${{ false && needs.lint-and-select-tests.outputs.csrc_310p_need_build == 'true' }}
    uses: ./.github/workflows/push_build_csrc_cache.yaml
    with:
      ref: ${{ github.sha }}
      cache_name: 310p
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-ubuntu22.04-py3.12
      soc_version: ascend310p1
      cache_key: ${{ needs.lint-and-select-tests.outputs.csrc_310p_cache_key }}

  run-selected-tests:
    needs:
      - lint-and-select-tests
      - build-a2-csrc-cache
      - build-a3-csrc-cache
      - build-310p-csrc-cache
    if: >-
      ${{
        always() &&
        needs.lint-and-select-tests.result == 'success' &&
        needs.lint-and-select-tests.outputs.has_tests == 'true' &&
        contains(fromJSON('["success","skipped"]'), needs.build-a2-csrc-cache.result) &&
        contains(fromJSON('["success","skipped"]'), needs.build-a3-csrc-cache.result) &&
        contains(fromJSON('["success","skipped"]'), needs.build-310p-csrc-cache.result)
      }}
    strategy:
      matrix:
        vllm_version:
          - ${{ needs.lint-and-select-tests.outputs.main_commit }}
          # - ${{ needs.lint-and-select-tests.outputs.release_tag }}
    uses: ./.github/workflows/_selected_tests.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      ref: ${{ github.sha }}
      base_ref: ''
      test_groups: ${{ needs.lint-and-select-tests.outputs.test_groups }}
      require_prebuilt_csrc_cache: true
      a2_csrc_cache_key: ${{ needs.lint-and-select-tests.outputs.a2_csrc_cache_key }}
      a3_csrc_cache_key: ${{ needs.lint-and-select-tests.outputs.a3_csrc_cache_key }}
      csrc_310p_cache_key: ${{ needs.lint-and-select-tests.outputs.csrc_310p_cache_key }}

  generate-hitest:
    name: Generate hitest recommendations
    needs: lint-and-select-tests
    if: ${{ needs.lint-and-select-tests.outputs.has_tests == 'true' }}
    uses: ./.github/workflows/_manual-hitest.yaml
    secrets:
      HITEST_APIG_APPCODE: ${{ secrets.HITEST_APIG_APPCODE }}
      HITEST_KEY: ${{ secrets.HITEST_KEY }}
      HITEST_SECRET: ${{ secrets.HITEST_SECRET }}

  # Summary gate job — use this single, stable name as the required status check
  # in GitHub branch protection rules instead of tracking individual matrix job names.
  ci-gate:
    needs:
      - lint-and-select-tests
      - build-a2-csrc-cache
      - build-a3-csrc-cache
      - build-310p-csrc-cache
      - run-selected-tests
    if: ${{ always() && contains(github.event.pull_request.labels.*.name, 'ready') }}
    runs-on: linux-amd64-cpu-2-hk
    steps:
      - name: Check all required jobs
        run: |
          set -euo pipefail

          LINT_RESULT="${{ needs.lint-and-select-tests.result }}"
          A2_BUILD_RESULT="${{ needs.build-a2-csrc-cache.result }}"
          A3_BUILD_RESULT="${{ needs.build-a3-csrc-cache.result }}"
          P310_BUILD_RESULT="${{ needs.build-310p-csrc-cache.result }}"
          HAS_TESTS="${{ needs.lint-and-select-tests.outputs.has_tests }}"

          echo "=== CI Gate Summary ==="
          echo "lint-and-select-tests: ${LINT_RESULT}"
          echo "build-a2-csrc-cache: ${A2_BUILD_RESULT}"
          echo "build-a3-csrc-cache: ${A3_BUILD_RESULT}"
          echo "build-310p-csrc-cache: ${P310_BUILD_RESULT}"
          echo "has_tests: ${HAS_TESTS}"

          if [ "${LINT_RESULT}" != "success" ] && [ "${LINT_RESULT}" != "skipped" ]; then
            echo "::error::lint-and-select-tests did not succeed (result: ${LINT_RESULT})"
            exit 1
          fi

          if [ "${HAS_TESTS}" = "true" ]; then
            for result in \
              "build-a2-csrc-cache:${A2_BUILD_RESULT}" \
              "build-a3-csrc-cache:${A3_BUILD_RESULT}" \
              "build-310p-csrc-cache:${P310_BUILD_RESULT}"; do
              job="${result%%:*}"
              status="${result#*:}"
              if [ "${status}" != "success" ] && [ "${status}" != "skipped" ]; then
                echo "::error::${job} did not succeed (result: ${status})"
                exit 1
              fi
            done

            TESTS_RESULT="${{ needs.run-selected-tests.result }}"
            echo "run-selected-tests: ${TESTS_RESULT}"
            if [ "${TESTS_RESULT}" != "success" ]; then
              echo "::error::run-selected-tests did not succeed (result: ${TESTS_RESULT})"
              exit 1
            fi
          fi

          echo "=== CI Gate: PASSED ==="
