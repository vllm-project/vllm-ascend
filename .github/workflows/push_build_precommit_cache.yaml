# This workflow populates the pre-commit cache in OBS on push to main.
# Fork PRs can then restore this cache read-only without needing OIDC credentials.
name: 'Cache pre-commit'
on:
  push:
    branches: ["main"]
    paths:
      - '.pre-commit-config.yaml'
      - 'requirements-lint.txt'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: precommit-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-cache:
    runs-on: linux-amd64-cpu-test-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Huawei Cloud Credentials
        id: hwcloud-creds
        uses: ascend-gha-runners/configure-hwcloud-credentials@3be5794f565c38f9719ef1f6bec28351c929be3c
        with:
          region: ap-southeast-1
          audience: hw-vllm-ascend-audience
          idp-id: github-vllm-ascend

      - name: Set OBS cache configuration
        if: steps.hwcloud-creds.outputs.success == 'true'
        run: |
          echo "RUNS_ON_S3_BUCKET_CACHE=ascend-ci-cache-hk" >> $GITHUB_ENV
          echo "RUNS_ON_S3_BUCKET_ENDPOINT=obs.ap-southeast-1.myhuaweicloud.com" >> $GITHUB_ENV
          echo "AWS_S3_FORCE_PATH_STYLE=true" >> $GITHUB_ENV
          echo "AWS_REGION=ap-southeast-1" >> $GITHUB_ENV
          echo "RUNS_ON_RUNNER_NAME=" >> $GITHUB_ENV

      - name: Check if cache exists
        id: check-cache
        uses: runs-on/cache/restore@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          lookup-only: true

      - name: Install pre-commit
        if: steps.check-cache.outputs.cache-hit != 'true'
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pip install pre-commit

      - name: Clean stale pre-commit cache
        if: steps.check-cache.outputs.cache-hit != 'true'
        run: pre-commit clean

      - name: Run pre-commit (populate cache)
        if: steps.check-cache.outputs.cache-hit != 'true'
        env:
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: |
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend
          pre-commit run --all-files --hook-stage manual --show-diff-on-failure

      - name: Save pre-commit cache
        if: always() && steps.hwcloud-creds.outputs.success == 'true' && steps.check-cache.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
