# Unified PR test workflow that combines light and full E2E tests.
# - Light tests: triggered when PR does NOT have 'ready' label (default behavior)
# - Full tests: triggered when PR has BOTH 'ready' AND 'ready-for-test' labels
# CI images (A2/A3/310P) are built once and shared between light and full tests.

name: PR-Test

on:
  pull_request:
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
    types: [ labeled, synchronize, opened ]

# Bash shells do not use ~/.profile or ~/.bashrc so these shells need to be explicitly
# declared as "shell: bash -el {0}" on steps that need to be properly activated.
# It's used to activate ascend-toolkit environment variables.
defaults:
  run:
    shell: bash -el {0}

# only cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_pre_commit.yml
    with:
      vllm: 15d76f74e2fdb12a95ea00f0ca283acf6219a2b7

  changes:
    runs-on: linux-aarch64-a2b3-0
    outputs:
      e2e_tracker: ${{ steps.filter.outputs.e2e_tracker }}
      ut_tracker: ${{ steps.filter.outputs.ut_tracker }}
      _310_tracker: ${{ steps.filter.outputs._310_tracker }}
    steps:
      - name: Setup git proxy
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global url."https://gh-proxy.test.osinfra.cn/https://github.com/".insteadOf https://github.com/
      # NOTE: Do not update the version of checkout, there have some issue on self_hosted runner with the higher version
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e_tracker:
              - '.github/workflows/pr_e2e_test.yaml'
              - '.github/workflows/_e2e_test.yaml'
              - 'vllm_ascend/**'
              - 'csrc/**'
              - 'cmake/**'
              - 'tests/e2e/**'
              - 'CMakeLists.txt'
              - 'setup.py'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'requirements-lint.txt'
              - 'packages.txt'
              - 'Dockerfile'
              - 'Dockerfile.a3'
              - 'Dockerfile.310p'
            ut_tracker:
              - 'tests/ut/**'
              - '.github/workflows/pr_e2e_test.yaml'
            _310_tracker:
              - 'vllm_ascend/_310p/**'
              - 'vllm_ascend/worker/model_runner_v1.py'
              - 'vllm_ascend/attention/attention_v1.py'
              - 'vllm_ascend/ops/fused_moe/**'
              - 'CMakeLists.txt'

  ut:
    needs: [lint, changes]
    name: unit test
    # only trigger unit test after lint passed and the change is e2e and ut related.
    if: ${{ needs.lint.result == 'success' && (needs.changes.outputs.e2e_tracker == 'true' || needs.changes.outputs.ut_tracker == 'true') }}
    strategy:
      matrix:
        vllm_version: [15d76f74e2fdb12a95ea00f0ca283acf6219a2b7, v0.16.0]
    uses: ./.github/workflows/_unit_test.yaml
    with:
      vllm: ${{ matrix.vllm_version }}
      runner: linux-amd64-cpu-8-hk
      image: quay.nju.edu.cn/ascend/cann:8.5.1-910b-ubuntu22.04-py3.11
      type: pr

  # Prebuild CI images (A2/A3/310P) using matrix strategy.
  # Images are pushed to SWR with PR number and vLLM version based tags.
  # Built once and shared between light and full E2E tests.
  # Build condition: e2e changes detected AND (light test OR full test will run)
  prebuild-ci-images:
    name: prebuild-${{ matrix.config.name }}-${{ matrix.vllm_version }}-image
    needs: [changes]
    if: >-
      ${{
        needs.changes.outputs.e2e_tracker == 'true' &&
        (
          !contains(github.event.pull_request.labels.*.name, 'ready') ||
          (contains(github.event.pull_request.labels.*.name, 'ready') && contains(github.event.pull_request.labels.*.name, 'ready-for-test'))
        )
      }}
    strategy:
      matrix:
        config:
          - name: a2
            dockerfile: Dockerfile
            tag_suffix: ''
          - name: a3
            dockerfile: Dockerfile.a3
            tag_suffix: '-a3'
          - name: 310p
            dockerfile: Dockerfile.310p
            tag_suffix: '-310p'
        vllm_version: [v0.16.0, 15d76f74e2fdb12a95ea00f0ca283acf6219a2b7]
    uses: ./.github/workflows/_e2e_prebuild_image.yaml
    with:
      dockerfile: ${{ matrix.config.dockerfile }}
      image_name: vllm-ascend-ci-image
      image_tag: pr-${{ github.event.pull_request.number }}-${{ matrix.vllm_version }}${{ matrix.config.tag_suffix }}
      cache_tag: ${{ github.base_ref }}${{ matrix.config.tag_suffix }}
      vllm_tag: ${{ matrix.vllm_version }}
    secrets: inherit

  # Light E2E tests - triggered when PR does NOT have 'ready' label
  # This is the default behavior for PRs without special labels
  e2e-light:
    name: e2e-light-${{ matrix.vllm_version }}
    strategy:
      matrix:
        vllm_version: [v0.16.0, 15d76f74e2fdb12a95ea00f0ca283acf6219a2b7]
    needs: [lint, changes, prebuild-ci-images]
    # only trigger e2e test after lint passed and the change is e2e related with pull request.
    # AND the PR does NOT have 'ready' label (mutually exclusive with full tests)
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        needs.lint.result == 'success' &&
        needs.changes.outputs.e2e_tracker == 'true' &&
        !contains(github.event.pull_request.labels.*.name, 'ready') &&
        needs.prebuild-ci-images.result == 'success'
      }}
    uses: ./.github/workflows/_e2e_test.yaml
    with:
      image: swr.cn-north-4.myhuaweicloud.com/vllm-ascend/vllm-ascend-ci-image:pr-${{ github.event.pull_request.number }}-${{ matrix.vllm_version }}
      contains_310: ${{ needs.changes.outputs._310_tracker == 'true' }}
      type: light

  # Full E2E tests - triggered when PR has BOTH 'ready' AND 'ready-for-test' labels
  # This is mutually exclusive with light tests
  e2e-full:
    name: e2e-full-${{ matrix.vllm_version }}
    strategy:
      matrix:
        vllm_version: [v0.16.0, 15d76f74e2fdb12a95ea00f0ca283acf6219a2b7]
    needs: [lint, changes, prebuild-ci-images]
    # Full tests require both 'ready' AND 'ready-for-test' labels
    if: >-
      ${{
        needs.lint.result == 'success' &&
        contains(github.event.pull_request.labels.*.name, 'ready') &&
        contains(github.event.pull_request.labels.*.name, 'ready-for-test') &&
        needs.changes.outputs.e2e_tracker == 'true' &&
        needs.prebuild-ci-images.result == 'success'
      }}
    uses: ./.github/workflows/_e2e_test.yaml
    with:
      image: swr.cn-north-4.myhuaweicloud.com/vllm-ascend/vllm-ascend-ci-image:pr-${{ github.event.pull_request.number }}-${{ matrix.vllm_version }}
      contains_310: false
      type: full