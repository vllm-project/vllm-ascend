name: Hitest

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
  workflow_dispatch:

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dump-auth-file:
    runs-on: linux-amd64-cpu-8-hk
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Git safe dir
        run: git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Write auth env file into repo workspace
        env:
          AUROGON_API_PREFIX: https://174e1b821a8446f38998a67186ba766e.apic.cn-southwest-2.huaweicloudapis.com/aurogon_service
          X_APIG_APPCODE: ${{ secrets.AUROGON_APPCODE }}
          APP_KEY: ${{ secrets.AUROGON_APPKEY }}
          APP_SECRET: ${{ secrets.AUROGON_APPSECRET }}
        run: |
          mkdir -p .github/workflows/scripts/tmp
          # 去掉 EOF 单引号，允许变量展开写入真实密钥
          cat > .github/workflows/scripts/tmp/auth.env <<EOF
          export AUROGON_API_PREFIX="${AUROGON_API_PREFIX}"
          export X_APIG_APPCODE="${X_APIG_APPCODE}"
          export APP_KEY="${APP_KEY}"
          export APP_SECRET="${APP_SECRET}"
          EOF

      - name: Upload auth env artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-env-file
          path: .github/workflows/scripts/tmp/auth.env

  run-hitest:
    needs: dump-auth-file
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download auth env artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-env-file
          path: .github/workflows/scripts/tmp/

      - name: Git safe directory config
        run: git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Quick lint for shell & python scripts
        env:
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: pre-commit run --files .github/workflows/scripts/hitest.sh .github/workflows/scripts/run_hitest.py

      # 先打印文件内容调试，确认密钥写入成功
      - name: Debug print env file
        run: cat .github/workflows/scripts/tmp/auth.env

      - name: Execute hitest entry with auth env
        run: |
          source .github/workflows/scripts/tmp/auth.env
          python3 .github/workflows/scripts/run_hitest.py
