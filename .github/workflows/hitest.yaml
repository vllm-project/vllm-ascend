name: Hitest

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'
      - '*-dev'
      - 'releases/v*'
  # 支持手动触发
  workflow_dispatch:

# 统一登录shell，加载Ascend环境变量
defaults:
  run:
    shell: bash -el {0}

# 同PR并发互斥，新提交取消旧任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-hitest:
    runs-on: linux-amd64-cpu-8-hk
    container:
      image: quay.io/ascend-ci/vllm-ascend:lint
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Git safe directory config
        run: git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      # 可选：简易lint校验新增脚本文件（和E2E保持一致）
      - name: Quick lint for shell & python scripts
        env:
          PRE_COMMIT_COLOR: always
          FORCE_COLOR: "1"
          TERM: xterm-256color
          SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086"
        run: pre-commit run --files .github/workflows/scripts/hitest.sh .github/workflows/scripts/run_hitest.py

      # 执行封装python脚本，内部调用hitest.sh
      - name: Execute hitest entry
        env:
          AUROGON_API_PREFIX: https://174e1b821a8446f38998a67186ba766e.apic.cn-southwest-2.huaweicloudapis.com/aurogon_service
          X_APIG_APPCODE: ${{ secrets.AUROGON_APPCODE }}
          APP_KEY: ${{ secrets.AUROGON_APPKEY }}
          APP_SECRET: ${{ secrets.AUROGON_APPSECRET }}
        run: python3 .github/workflows/scripts/run_hitest.py
