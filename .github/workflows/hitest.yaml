name: Hitest

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-hitest:
    runs-on: linux-amd64-cpu-8-hk
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Git safe directory config
        run: git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Execute hitest entry
        env:
          AUROGON_API_PREFIX: https://174e1b821a8446f38998a67186ba766e.apic.cn-southwest-2.huaweicloudapis.com/aurogon_service
          X_APIG_APPCODE: ${{ secrets.AUROGON_APPCODE }}
          APP_KEY: ${{ secrets.AUROGON_APPKEY }}
          APP_SECRET: ${{ secrets.AUROGON_APPSECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "====DEBUG ENV START===="
          echo "AUROGON_API_PREFIX=$AUROGON_API_PREFIX"
          echo "X_APIG_APPCODE length: ${#X_APIG_APPCODE}"
          echo "APP_KEY length: ${#APP_KEY}"
          echo "APP_SECRET length: ${#APP_SECRET}"
          echo "====DEBUG ENV END===="
          python3 .github/workflows/scripts/run_hitest.py

      - name: Upload recommended pytest paths artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommended-pytest-paths
          path: .github/workflows/scripts/recommended_pytest_paths.txt
          if-no-files-found: warn
          retention-days: 14
