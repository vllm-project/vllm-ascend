name: Image_oncall
on:
  workflow_call:
    inputs:
      suffix:
        description: 'The tag subfix to use'
        required: true
        type: string
      should_push:
        description: 'Whether to push the image'
        required: false
        type: boolean
        default: False
      dockerfile:
        description: 'The Dockerfile to use'
        required: false
        type: string
      workflow_dispatch_tag:
        description: 'The tag to use for workflow dispatch'
        required: false
        type: string
      branch_ref:
        description: 'Branch/ref to check out for non-workflow_dispatch events'
        required: false
        type: string
        default: 'main'
      schedule_tag_pattern:
        description: 'Pattern used for the schedule Docker tag'
        required: false
        type: string
        default: 'main'
    secrets:
      CA_PEM:
        description: 'Buildkitd CA cert'
        required: true
      CERT_PEM:
        description: 'Buildkitd client cert'
        required: true
      KEY_PEM:
        description: 'Buildkitd client key'
        required: true

env:
  QUAY_REPO: quay.io/atlas-ci/vllm-atlas-temp

jobs:
  build-push-digest:
    name: build
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux/amd64
            runner: linux-amd64-cpu-32-hk
            tag: amd64
          - arch: linux/amd64
            runner: linux-amd64-cpu-16-hk
            tag: amd64
          - arch: linux/amd64
            runner: linux-amd64-cpu-8-hk
            tag: amd64
    steps:

    - name: Validate inputs (workflow_dispatch only)
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        tag="${{ inputs.workflow_dispatch_tag }}"
        branch="${{ inputs.branch_ref }}"
        if [[ -n "$tag" && -n "$branch" ]]; then
          echo "Error: 'tag' and 'branch' are mutually exclusive. Please specify only one."
          exit 1
        fi
        if [[ -z "$tag" && -z "$branch" ]]; then
          echo "Error: Either 'tag' or 'branch' must be specified."
          exit 1
        fi

    - uses: actions/checkout@v6
      if: ${{ github.event_name != 'workflow_dispatch' }}
      with:
        fetch-depth: 0
        persist-credentials: false
        ref: ${{ inputs.branch_ref }}

    - uses: actions/checkout@v6
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag != '' }}
      with:
        fetch-depth: 0
        persist-credentials: false
        ref: ${{ inputs.workflow_dispatch_tag }}

    - uses: actions/checkout@v6
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag == '' }}
      with:
        fetch-depth: 0
        persist-credentials: false
        ref: ${{ inputs.branch_ref }}

    - name: Prepare suffix
      run: |
        if [ -n "${{ inputs.suffix }}" ]; then
          echo "SUFFIX=-${{ inputs.suffix }}-${{ matrix.tag }}" >> $GITHUB_ENV
        else
          echo "SUFFIX=-${{ matrix.tag }}" >> $GITHUB_ENV
        fi

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.QUAY_REPO }}
        tags: |
          type=pep440,pattern={{raw}},suffix=${{ env.SUFFIX }}
          type=schedule,pattern=${{ inputs.schedule_tag_pattern }},prefix=nightly-,suffix=${{ env.SUFFIX }}
          type=raw,value=${{ inputs.workflow_dispatch_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag != '' }},suffix=${{ env.SUFFIX }}
          type=raw,value=${{ inputs.branch_ref }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.workflow_dispatch_tag == '' }},prefix=nightly-,suffix=${{ env.SUFFIX }}
        flavor:
          latest=false

    - name: Prepare docker config
      if: ${{ inputs.should_push }}
      run: |
        mkdir -p /tmp/bk
        QUAY_AUTH=$(printf "%s:%s" "${QUAY_TEMP_USERNAME}" "${QUAY_TEMP_PASSWORD}" | base64 -w0)
        cat > /tmp/bk/config.json <<EOF
        {
          "auths": {
            "quay.io": { "auth": "${QUAY_AUTH}" }
          }
        }
        EOF

    # - name: Debug env
    #   run: |
    #     echo "BUILDKITD_ADDR=${BUILDKITD_ADDR:-<not set>}"
    #     echo "CA_PEM=${CA_PEM:-<not set>}"
    #     echo "CERT_PEM=${CERT_PEM:-<not set>}"
    #     echo "KEY_PEM=${KEY_PEM:-<not set>}"
    #     echo "DOCKER_CONFIG=${DOCKER_CONFIG:-<not set>}"
    #     echo "--- relevant env vars ---"
    #     env | grep -iE 'build|docker|cert|tls|key|quay' || true
    - name: Prepare TLS certs
      env:
        CA_PEM: ${{ secrets.CA_PEM }}
        CERT_PEM: ${{ secrets.CERT_PEM }}
        KEY_PEM: ${{ secrets.KEY_PEM }}
      run: |
        mkdir -p /tmp/bk/tls
        umask 077
        printf '%s\n' "$CA_PEM"   | tr -d '\r' > /tmp/bk/tls/ca.pem
        printf '%s\n' "$CERT_PEM" | tr -d '\r' > /tmp/bk/tls/cert.pem
        printf '%s\n' "$KEY_PEM"  | tr -d '\r' > /tmp/bk/tls/key.pem

        echo "=== File sizes ==="
        echo "ca.pem:   $(wc -c < /tmp/bk/tls/ca.pem) bytes"
        echo "cert.pem: $(wc -c < /tmp/bk/tls/cert.pem) bytes"
        echo "key.pem:  $(wc -c < /tmp/bk/tls/key.pem) bytes"

        echo "=== First line of each file ==="
        head -1 /tmp/bk/tls/ca.pem   | cut -c1-20
        head -1 /tmp/bk/tls/cert.pem | cut -c1-20
        head -1 /tmp/bk/tls/key.pem  | cut -c1-20

        echo "=== Cert info (subject/issuer/dates) ==="
        openssl x509 -in /tmp/bk/tls/cert.pem -noout -subject -issuer -dates

        echo "=== Cert vs Key modulus match ==="
        CERT_MOD=$(openssl x509 -in /tmp/bk/tls/cert.pem -noout -modulus | md5sum)
        KEY_MOD=$(openssl rsa -in /tmp/bk/tls/key.pem -noout -modulus 2>/dev/null | md5sum)
        echo "cert modulus: $CERT_MOD"
        echo "key  modulus: $KEY_MOD"
        if [ "$CERT_MOD" = "$KEY_MOD" ]; then
          echo "RESULT: MATCH"
        else
          echo "RESULT: MISMATCH"
        fi

        echo "=== Verify cert against CA ==="
        openssl verify -CAfile /tmp/bk/tls/ca.pem /tmp/bk/tls/cert.pem || true

    - name: Build and push
      id: build
      run: |
        # echo "Installing buildctl..." 
        # mkdir -p /tmp/buildkit 
        # BUILDKIT_VERSION="v0.29.0" 
        # ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') 
        # curl -fsSL "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-${ARCH}.tar.gz" -o /tmp/buildkit.tar.gz
        # tar -xzf /tmp/buildkit.tar.gz -C /tmp/buildkit 
        # export PATH=$PATH:/tmp/buildkit/bin/
        
        # chmod +x /tmp/buildkit/bin/buildctl 

        # echo "buildctl installed successfully" buildctl --version
        # set -ex
        which buildctl

        DOCKERFILE="${{ inputs.dockerfile || 'Dockerfile' }}"
        DOCKERFILE_DIR=$(dirname "$DOCKERFILE")
        DOCKERFILE_NAME=$(basename "$DOCKERFILE")

        ARGS=(
          --addr="tcp://buildkitd-service.buildkitd:1234"
          --tlscacert=/tmp/bk/tls/ca.pem
          --tlscert=/tmp/bk/tls/cert.pem
          --tlskey=/tmp/bk/tls/key.pem

          build
          --frontend dockerfile.v0
          --local context=.
          --local dockerfile="$DOCKERFILE_DIR"
          --opt filename="$DOCKERFILE_NAME"
          --opt platform=${{ matrix.arch }}
          --opt build-arg:PIP_INDEX_URL=https://pypi.org/simple
          --progress=plain
        )


        if [ "${{ inputs.should_push }}" = "true" ]; then
          ARGS+=(--secret id=dockerconfig,src=/tmp/bk/config.json)

          OUTPUT="type=image,"
          IFS=$'\n'
          for tag in $(echo "${{ steps.meta.outputs.tags }}"); do
            [ -z "$tag" ] && continue
            OUTPUT="${OUTPUT}name=${tag},"
          done
          unset IFS
          OUTPUT="${OUTPUT%,},push=true"
          ARGS+=(--output "$OUTPUT")
        fi


        buildctl "${ARGS[@]}"