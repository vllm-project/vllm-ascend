# Reusable workflow that builds CI test images on CPU runners and pushes them
# to the Quay temp repo.  Always builds all 4 npu_types x 2 vllm versions = 8
# images.  Image tag format:
#   vllm-ascend-pr<pr_number>-<vllm_label>-<npu_type>-<arch>
#
# The image contains vllm + vllm-ascend fully installed (source baked in at
# /vllm-workspace/vllm-ascend) so that _selected_tests.yaml only needs to run
# the tests — no checkout or install steps.

name: Build Test Image

on:
  workflow_call:
    inputs:
      vllm_main_commit:
        type: string
        required: true
        description: 'vLLM main commit hash (from .github/vllm-main-verified.commit).'
      vllm_release_tag:
        type: string
        required: true
        description: 'vLLM release tag (from .github/vllm-release-tag.commit).'
      pr_number:
        type: string
        required: true
        description: 'PR number for image tag construction.'
      ascend_ref:
        type: string
        required: true
        description: 'The vllm-ascend commit hash (PR head sha) to build from.'
      quay_temp_username:
        type: string
        required: false
        default: ''
        description: 'Quay username for pushing temp images.'
    secrets:
      QUAY_TEMP_PASSWORD:
        description: 'Quay password for pushing temp images.'
        required: false

env:
  QUAY_TEMP_REPO: quay.io/atlas-ci/vllm-atlas-temp
  CACHE_REPO: ghcr.io/vllm-project/vllm-ascend

defaults:
  run:
    shell: bash -el {0}

permissions:
  packages: write
  contents: read

jobs:
  build-push:
    name: build-${{ matrix.entry.npu_type }}-${{ matrix.entry.vllm_label }}
    runs-on: ${{ matrix.entry.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # A2 (ARM64, device)
          - npu_type: a2
            cann_tag: "9.0.0-910b-ubuntu22.04-py3.12"
            soc: "ascend910b1"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: main
            vllm_version: ${{ inputs.vllm_main_commit }}
          - npu_type: a2
            cann_tag: "9.0.0-910b-ubuntu22.04-py3.12"
            soc: "ascend910b1"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: release
            vllm_version: ${{ inputs.vllm_release_tag }}
          # A3 (ARM64, device)
          - npu_type: a3
            cann_tag: "9.0.0-a3-ubuntu22.04-py3.12"
            soc: "ascend910_9391"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: main
            vllm_version: ${{ inputs.vllm_main_commit }}
          - npu_type: a3
            cann_tag: "9.0.0-a3-ubuntu22.04-py3.12"
            soc: "ascend910_9391"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: release
            vllm_version: ${{ inputs.vllm_release_tag }}
          # 310P (ARM64, device)
          - npu_type: 310p
            cann_tag: "9.1.0-beta.1-310p-ubuntu22.04-py3.12"
            soc: "ascend310p1"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: main
            vllm_version: ${{ inputs.vllm_main_commit }}
          - npu_type: 310p
            cann_tag: "9.1.0-beta.1-310p-ubuntu22.04-py3.12"
            soc: "ascend310p1"
            arch: arm64
            mode: device
            runner: linux-arm64-cpu-16
            vllm_label: release
            vllm_version: ${{ inputs.vllm_release_tag }}
          # CPU (AMD64, nodevice)
          - npu_type: cpu
            cann_tag: "9.0.0-910b-ubuntu22.04-py3.12"
            soc: "ascend910b1"
            arch: amd64
            mode: nodevice
            runner: linux-amd64-cpu-16-hk
            vllm_label: main
            vllm_version: ${{ inputs.vllm_main_commit }}
          - npu_type: cpu
            cann_tag: "9.0.0-910b-ubuntu22.04-py3.12"
            soc: "ascend910b1"
            arch: amd64
            mode: nodevice
            runner: linux-amd64-cpu-16-hk
            vllm_label: release
            vllm_version: ${{ inputs.vllm_release_tag }}
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ascend_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Rebase on latest main
        run: |
          git config user.name "vllm-ascend-ci"
          git config user.email "vllm-ascend-ci@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main

      - name: Get csrc hash
        id: get_csrc_hash
        run: |
          CSRC_HASH=$(find ./csrc ./setup.py ./CMakeLists.txt ./cmake \
            -type f -not -path '*/.*' | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "CSRC_HASH=$CSRC_HASH" >> $GITHUB_OUTPUT

      - name: Get architecture
        id: get_arch
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) echo "arch=X64" >> $GITHUB_OUTPUT ;;
            aarch64) echo "arch=ARM64" >> $GITHUB_OUTPUT ;;
            *) echo "arch=$ARCH" >> $GITHUB_OUTPUT ;;
          esac

      - name: Restore vllm-ascend csrc cache
        id: cache-csrc
        uses: runs-on/cache/restore@v5
        with:
          path: |
            vllm_ascend/_cann_ops_custom
            vllm_ascend/*.so
            vllm_ascend/lib
            vllm_ascend/include
          key: vllm-ascend-build-v1-${{ steps.get_arch.outputs.arch }}-${{ matrix.entry.cann_tag }}-${{ steps.get_csrc_hash.outputs.CSRC_HASH }}

      - name: Login to Quay Temp
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ inputs.quay_temp_username }}
          password: ${{ secrets.QUAY_TEMP_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver: docker-container
          use: true

      - name: Login to GitHub Container Registry (for cache)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute cache tag
        id: cache_tag
        run: |
          echo "value=buildcache-ci-${{ matrix.entry.npu_type }}-${{ matrix.entry.arch }}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: .github/workflows/dockerfiles/Dockerfile.ci_test
          platforms: linux/${{ matrix.entry.arch }}
          push: true
          tags: ${{ env.QUAY_TEMP_REPO }}:vllm-ascend-pr${{ inputs.pr_number }}-${{ matrix.entry.vllm_label }}-${{ matrix.entry.npu_type }}-${{ matrix.entry.arch }}
          build-args: |
            CANN_TAG=${{ matrix.entry.cann_tag }}
            VLLM_COMMIT=${{ matrix.entry.vllm_version }}
            SOC_VERSION=${{ matrix.entry.soc }}
            INSTALL_MODE=${{ matrix.entry.mode }}
          provenance: false
          cache-from: type=registry,ref=${{ env.CACHE_REPO }}:${{ steps.cache_tag.outputs.value }}
          cache-to: type=registry,ref=${{ env.CACHE_REPO }}:${{ steps.cache_tag.outputs.value }},mode=max
