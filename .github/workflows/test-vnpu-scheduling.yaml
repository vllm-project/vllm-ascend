name: test-vnpu-scheduling

on:
  workflow_dispatch:

jobs:
  vnpu-scheduling-test:
    runs-on: linux-aarch64-a2-8-vnpu-gy006
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-910b-ubuntu22.04-py3.12

    steps:
      - name: Check NPU info (vnpu)
        run: |
          echo "=== Runner Info ==="
          echo "Hostname: $(hostname)"
          echo "Architecture: $(uname -m)"
          echo ""

          echo "=== NPU SMI Info ==="
          npu-smi info

      - name: Show NPU device count
        run: |
          echo "=== NPU Device Count ==="
          npu-smi info -l | grep -c "npu" || echo "npu-smi list failed"

      - name: Verify scheduling label
        run: |
          echo "=== Scheduling Verification ==="
          echo "This job was successfully scheduled to runner: linux-aarch64-a2-8-vnpu-gy006"
          echo "vnpu label scheduling test PASSED"
