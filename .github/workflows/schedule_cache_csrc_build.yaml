name: 'Cache csrc Build Directory'
on:
  schedule:
    # UTC+8: 23：59pm every day
    - cron: '59 15 * * *'

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ascend-csrc-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1

jobs:
  build-cache:
    name: build-${{ matrix.arch }}-${{ matrix.chip_type }}-${{ matrix.os }}-cache
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - X64
          - ARM64
        os:
          - ubuntu
          - openeuler
        chip_type:
          - a2
          - a3
          - 310p

        include:
          # arch → runner
          - arch: X64
            runner: linux-amd64-cpu-16-hk
          - arch: ARM64
            runner: linux-arm64-cpu-16

          # chip_type → soc_version
          - chip_type: a2
            soc_version: ascend910b1
          - chip_type: a3
            soc_version: ascend910_9391
          - chip_type: 310p
            soc_version: ascend310p1

          # os × chip_type → image
          - os: ubuntu
            chip_type: a2
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-910b-ubuntu22.04-py3.11
          - os: ubuntu
            chip_type: a3
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-a3-ubuntu22.04-py3.11
          - os: ubuntu
            chip_type: 310p
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-ubuntu22.04-py3.11
          - os: openeuler
            chip_type: a2
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-910b-openeuler24.03-py3.11
          - os: openeuler
            chip_type: a3
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-a3-openeuler24.03-py3.11
          - os: openeuler
            chip_type: 310p
            image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.1.0-beta.1-310p-openeuler24.03-py3.11

    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Config mirrors (ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Config mirrors (openeuler)
        if: matrix.os == 'openeuler'
        run: |
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          sed -Ei 's@https?://[^/]+/(openeuler|centos|fedora)@http://cache-service.nginx-pypi-cache.svc.cluster.local:8081/\1@g' /etc/yum.repos.d/*.repo
          yum install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev zstd clang-15 ninja-build
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          pip install uv

      - name: Install system dependencies (openeuler)
        if: matrix.os == 'openeuler'
        run: |
          yum install -y gcc gcc-c++ cmake numactl-devel clang ninja-build
          pip install uv

      - name: Get csrc build cache base branch
        id: get_csrc_build_cache_base_branch
        run: |
          base_branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME:-unknown-branch}}"
          base_branch=$(printf "%s" "$base_branch" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$base_branch" ]; then
            base_branch="unknown-branch"
          fi
          echo "base_branch=$base_branch" >> "$GITHUB_OUTPUT"

      - name: Get current cache hour
        id: get_cache_time
        run: |
          cache_time=$(date -u +'%Y%m%d%H')
          echo "cache_time=$cache_time" >> "$GITHUB_OUTPUT"

      - name: Restore vllm-ascend csrc build cache
        id: restore-csrc-build-cache
        uses: runs-on/cache/restore@v5
        with:
          path: |
            csrc/build
          key: vllm-ascend-build-ninja-v1-${{ steps.get_csrc_build_cache_base_branch.outputs.base_branch }}-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.image }}-${{ steps.get_cache_time.outputs.cache_time }}
          restore-keys: |
            vllm-ascend-build-ninja-v1-${{ steps.get_csrc_build_cache_base_branch.outputs.base_branch }}-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.image }}-

      - name: Install vllm-ascend
        env:
          SOC_VERSION: ${{ matrix.soc_version }}
          MAX_JOBS: "16"
        run: |
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh
          arch=$(uname -i)
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/${arch}-linux/devlib

          # os-specific: openeuler needs C++ include path for compilation
          if [ "${{ matrix.os }}" = "openeuler" ]; then
            export CPLUS_INCLUDE_PATH=$CPLUS_INCLUDE_PATH:/usr/include/c++/12:/usr/include/c++/12/${arch}-openEuler-linux
          fi

          pip install uc-manager
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu
          uv pip install --force-reinstall --no-deps triton-ascend==3.2.1
          uv pip install -e . --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Save vllm-ascend csrc build cache
        if: success() && steps.restore-csrc-build-cache.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v5
        with:
          path: |
            csrc/build
          key: vllm-ascend-build-ninja-v1-${{ steps.get_csrc_build_cache_base_branch.outputs.base_branch }}-${{ runner.os }}-${{ matrix.arch }}-${{ matrix.image }}-${{ steps.get_cache_time.outputs.cache_time }}
