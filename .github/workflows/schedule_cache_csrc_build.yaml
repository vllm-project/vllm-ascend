name: 'Cache csrc Compiler Cache (ccache)'

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # UTC+8: 2am every day
    - cron: '0 18 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ascend-csrc-ccache-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1
  # CI-internal CANN image registry mirror — this is infrastructure configuration,
  # not a per-image dependency. All consumers use the same registry prefix.
  IMAGE_REGISTRY: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann
  CSRC_COMPILER_CACHE_VERSION: ccache-v1
  CCACHE_MAXSIZE: 5G

jobs:
  # -------------------------------------------------------------------------
  # Job 1: dynamically build the matrix from Dockerfiles
  # -------------------------------------------------------------------------
  setup-matrix:
    name: Setup build matrix
    runs-on: linux-amd64-cpu-8-hk
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate build matrix from Dockerfiles
        id: generate
        run: |
          python -m pip install pyyaml

          if [[ "${{ github.event_name }}" == "push" ]]; then
            matrix=$(python .github/workflows/scripts/generate_cache_matrix.py --branch-filter "${GITHUB_REF_NAME}")
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR validation should not fan out to all release branches.
            matrix=$(python .github/workflows/scripts/generate_cache_matrix.py --branch-filter "${GITHUB_BASE_REF}")
          else
            matrix=$(python .github/workflows/scripts/generate_cache_matrix.py)
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Job 2: build csrc compiler cache for all branches × dockerfiles × archs
  # -------------------------------------------------------------------------
  build-cache:
    name: ${{ matrix.branch_normalized }}-${{ matrix.dockerfile }}-${{ matrix.arch }}
    needs: setup-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Avoid flooding GitCode third-party release downloads from concurrent matrix jobs.
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    container:
      image: ${{ matrix.image }}

    env:
      UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
      UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu/"
      UV_INDEX_STRATEGY: unsafe-best-match
      UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
      UV_HTTP_TIMEOUT: 120
      UV_NO_CACHE: 1
      UV_SYSTEM_PYTHON: 1
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      CCACHE_COMPILERCHECK: content

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Config mirrors (ubuntu)
        if: matrix.os_type == 'ubuntu'
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Config mirrors (openeuler)
        if: matrix.os_type == 'openeuler'
        run: |
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          sed -Ei 's@https?://[^/]+/(openeuler|centos|fedora)@http://cache-service.nginx-pypi-cache.svc.cluster.local:8081/\1@g' /etc/yum.repos.d/*.repo
          yum install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Install system dependencies (ubuntu)
        if: matrix.os_type == 'ubuntu'
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev zstd clang-15 ccache
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          pip install uv

      - name: Install system dependencies (openeuler)
        if: matrix.os_type == 'openeuler'
        run: |
          yum install -y python3-pip git vim wget net-tools gcc gcc-c++ make cmake numactl numactl-devel jemalloc patch ccache
          pip install uv

      - name: Restore ccache
        id: restore-ccache
        uses: runs-on/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: vllm-ascend-${{ env.CSRC_COMPILER_CACHE_VERSION }}-${{ matrix.branch_normalized }}-${{ runner.os }}-${{ matrix.arch }}-${{ env.IMAGE_REGISTRY }}:${{ matrix.image_tag }}-${{ github.sha }}
          restore-keys: |
            vllm-ascend-${{ env.CSRC_COMPILER_CACHE_VERSION }}-${{ matrix.branch_normalized }}-${{ runner.os }}-${{ matrix.arch }}-${{ env.IMAGE_REGISTRY }}:${{ matrix.image_tag }}-
            vllm-ascend-${{ env.CSRC_COMPILER_CACHE_VERSION }}-${{ runner.os }}-${{ matrix.arch }}-${{ env.IMAGE_REGISTRY }}:${{ matrix.image_tag }}-

      - name: Configure ccache
        run: |
          set -x
          export CCACHE_DIR="${CCACHE_DIR:-$GITHUB_WORKSPACE/.ccache}"
          export CCACHE_MAXSIZE="${CCACHE_MAXSIZE:-5G}"
          mkdir -p "$CCACHE_DIR"
          command -v ccache
          ccache --version
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=compression=true
          ccache --set-config=compiler_check=content
          ccache --set-config=base_dir="$GITHUB_WORKSPACE"
          ccache --zero-stats
          ccache --show-config || true
          ccache --show-stats || true

      - name: Install vllm-ascend
        env:
          SOC_VERSION: ${{ matrix.soc_version }}
        run: |
          set -x
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh
          echo "Environment variables initialized"

          arch=$(uname -i)
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/${arch}-linux/devlib

          export CCACHE_DIR="$CCACHE_DIR"
          export CCACHE_MAXSIZE="$CCACHE_MAXSIZE"
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export CMAKE_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ${CMAKE_ARGS:-}"

          echo "start installing requirements at $(date -u +'%Y-%m-%d %H:%M:%S')"
          pip install uc-manager
          uv pip install -r requirements-dev.txt
          uv pip install --force-reinstall --no-deps triton-ascend==3.2.1

          echo "start installing vllm-ascend at $(date -u +'%Y-%m-%d %H:%M:%S')"
          uv pip install -e . --no-build-isolation
          echo "vllm-ascend installed successfully"
          echo "vllm-ascend installation completed at $(date -u +'%Y-%m-%d %H:%M:%S')"

      - name: Show ccache stats
        if: always()
        run: |
          ccache --show-stats || true
          ccache --show-compression || true

      - name: Save ccache
        if: success() &&  steps.restore-ccache.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: vllm-ascend-${{ env.CSRC_COMPILER_CACHE_VERSION }}-${{ matrix.branch_normalized }}-${{ runner.os }}-${{ matrix.arch }}-${{ env.IMAGE_REGISTRY }}:${{ matrix.image_tag }}-${{ github.sha }}