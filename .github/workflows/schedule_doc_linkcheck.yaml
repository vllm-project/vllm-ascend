name: Docs link check

on:
  schedule:
    # GitHub cron uses UTC. This runs every Sunday at 20:00 UTC+8.
    - cron: '0 12 * * 0'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'docs/source/**/*.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read

concurrency:
  group: docs-linkcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Sphinx linkcheck
    runs-on: linux-aarch64-a2b3-0
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.5.1-910b-ubuntu22.04-py3.11
    timeout-minutes: 30
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed docs files
        id: changed-docs
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          git diff --name-only --diff-filter=AMR \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- docs/source \
            | sed -n '/\.md$/ s#^docs/##p' > changed-docs.txt

          if [ ! -s changed-docs.txt ]; then
            echo "has_linkcheck_files=false" >> "$GITHUB_OUTPUT"
            echo "No added or modified Sphinx docs files to linkcheck."
            exit 0
          fi

          echo "has_linkcheck_files=true" >> "$GITHUB_OUTPUT"
          echo "Changed docs files:"
          sed 's/^/  /' changed-docs.txt

      - name: Install docs dependencies
        if: ${{ github.event_name != 'pull_request' || steps.changed-docs.outputs.has_linkcheck_files == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Run full Sphinx linkcheck
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          make -C docs linkcheck SPHINXOPTS="-W --keep-going"

      - name: Run Sphinx linkcheck for changed docs
        if: ${{ github.event_name == 'pull_request' && steps.changed-docs.outputs.has_linkcheck_files == 'true' }}
        run: |
          set -euo pipefail

          mapfile -t changed_docs < changed-docs.txt

          cd docs
          sphinx-build -b linkcheck -W --keep-going \
            source _build/linkcheck "${changed_docs[@]}"

      - name: Upload linkcheck reports
        if: ${{ always() && github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-linkcheck-report
          path: |
            docs/_build/linkcheck/output.txt
            docs/_build/linkcheck/output.json
          if-no-files-found: warn
          retention-days: 5
