name: 'Setup vars'

on:
  workflow_call:
    inputs:
      runner:
        required: false
        type: string
        default: linux-aarch64-a2b3-0
      run:
        required: false
        type: string
        default: 'false'
      vllm_ascend_branch:
        required: false
        type: string
        default: ''
      ascend_log_prefix:
        required: false
        type: string
        default: '/root/.cache/ascend-logs'
    outputs:
      ascend_log_prefix:
        description: "Ascend log prefix path"
        value: ${{ jobs.setup_vars.outputs.ascend_log_prefix }}
      vllm_ascend_branches:
        description: "JSON array of vllm-ascend branches to test"
        value: ${{ jobs.setup_vars.outputs.vllm_ascend_branches }}
      single_node_configs:
        description: "Comma-separated list of existing single-node config files"
        value: ${{ jobs.setup_vars.outputs.single_node_configs }}
      multi_node_configs:
        description: "Comma-separated list of existing multi-node config files"
        value: ${{ jobs.setup_vars.outputs.multi_node_configs }}

jobs:
  setup_vars:
    name: Export global env vars as job outputs
    runs-on: ${{ inputs.runner }}
    outputs:
      ascend_log_prefix: ${{ steps.export.outputs.ascend_log_prefix }}
      vllm_ascend_branches: ${{ steps.export.outputs.vllm_ascend_branches }}
      single_node_configs: ${{ steps.list-configs.outputs.single_node_configs }}
      multi_node_configs: ${{ steps.list-configs.outputs.multi_node_configs }}
    steps:
      - id: export
        run: |
          {
            echo "ascend_log_prefix=${{ inputs.ascend_log_prefix }}"
            input_branch="${{ inputs.vllm_ascend_branch }}"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base_ref="${{ github.base_ref }}"
              normalized=$(echo "$base_ref" | tr '/' '-')
              echo "vllm_ascend_branches=[\"${normalized}\"]"
              echo "vllm_ascend_branch_ref=$base_ref"
            elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              normalized=$(echo "$input_branch" | tr '/' '-')
              echo "vllm_ascend_branches=[\"${normalized}\"]"
              echo "vllm_ascend_branch_ref=$input_branch"
            else
              # Branches to test in nightly schedule runs; supports multiple versions
              # Parse JSON-like array: strip brackets/quotes, split on comma
              branches=$(echo "$input_branch" | sed 's/[[:space:]\[\]"]//g' | tr ',' '\n' | grep -v '^$')
              # Rebuild as valid JSON array with / replaced by -
              json_branches=$(echo "$branches" | while read -r b; do echo "\"$(echo "$b" | tr '/' '-')\""; done | paste -sd',' -)
              echo "vllm_ascend_branches=[${json_branches}]"
              # First non-main branch as checkout ref; fall back to main to skip checkout
              branch_ref=$(echo "$branches" | grep -v '^main$' | head -1)
              echo "vllm_ascend_branch_ref=${branch_ref:-main}"
            fi
          } >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: inputs.run == 'true' && steps.export.outputs.vllm_ascend_branch_ref != 'main'
        with:
          ref: ${{ steps.export.outputs.vllm_ascend_branch_ref }}
          fetch-depth: 1

      - name: List existing config files
        id: list-configs
        if: inputs.run == 'true' && steps.export.outputs.vllm_ascend_branch_ref != 'main'
        run: |
          single=$(find tests/e2e/nightly/single_node/models/configs/ -maxdepth 1 -name '*.yaml' -printf '%f\n' 2>/dev/null | paste -sd',' - || echo '')
          multi=$(find tests/e2e/nightly/multi_node/config/ -maxdepth 1 -name '*.yaml' -printf '%f\n' 2>/dev/null | paste -sd',' - || echo '')
          echo "single_node_configs=$single" >> $GITHUB_OUTPUT
          echo "multi_node_configs=$multi" >> $GITHUB_OUTPUT
