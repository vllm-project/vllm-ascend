model_name: "BAAI/bge-reranker-v2-m3"
model_type: "vllm-reranker"
hardware: "Atlas A2 Series"

serve:
  tensor_parallel_size: 1
  dtype: auto
  max_model_len: 8192
  gpu_memory_utilization: 0.85
  trust_remote_code: true
  runner: "pooling"
  enforce_eager: true

tasks:
- name: "basic_score_validation"
  metrics:
  - name: "score_accuracy"
    value: 1.0
  - name: "sample_scores"
    value:
      query: "What is the capital of France?"
      doc_positive: "Paris is the capital of France."
      doc_negative: "Berlin is in Germany."
      score_positive: 0.9998
      score_negative: 0.00043

num_fewshot: 0
apply_chat_template: false
batch_size: "auto"