model_name: "zai-org/GLM-4.1V-9B-Thinking"
model_type: "vllm-vlm"
hardware: "Atlas A2 Series"

test_cases:
  - model: "zai-org/GLM-4.1V-9B-Thinking"
    server_cmd:
      - --served-model-name
      - glm4v
      - --tensor-parallel-size
      - "1"
      - --trust-remote-code
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.7"
      - --enforce-eager

serve:
  tensor_parallel_size: 1
  dtype: auto
  max_model_len: 8192
  gpu_memory_utilization: 0.7
  trust_remote_code: true
  served_model_name: "glm4v"
  enforce_eager: true

tasks:
- name: "mmmu_val"
  metrics:
  - name: "acc,none"
    value: 0.40

num_fewshot: 0
apply_chat_template: true
fewshot_as_multiturn: false
batch_size: 32
