model_name: "AI-ModelScope/NVLM-D-72B"
model_type: "vllm-vlm"
hardware: "Atlas A2 Series"

serve:
  tensor_parallel_size: 4
  dtype: bfloat16
  max_model_len: 16384
  gpu_memory_utilization: 0.90
  trust_remote_code: true

tasks:
- name: "mmmu_val"
  metrics:
  - name: "acc,none"
    value: 0.3878

num_fewshot: 0
apply_chat_template: true
fewshot_as_multiturn: false
batch_size: "auto"
