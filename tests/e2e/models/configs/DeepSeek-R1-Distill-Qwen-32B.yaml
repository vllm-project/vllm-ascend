model_name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"
model_type: "vllm"
hardware: "Atlas A2 Series"

serve:
  tensor_parallel_size: 2
  dtype: auto
  max_model_len: 32768
  gpu_memory_utilization: 0.9
  enforce_eager: true
  trust_remote_code: false

# gsm8k thresholds are estimates to be calibrated against the Ascend CI measured values (RTOL=0.05); DeepSeek publishes no official gsm8k score for this model.
tasks:
- name: "gsm8k"
  metrics:
  - name: "exact_match,strict-match"
    value: 0.83
  - name: "exact_match,flexible-extract"
    value: 0.92

num_fewshot: 5
apply_chat_template: true
fewshot_as_multiturn: true
batch_size: "auto"
