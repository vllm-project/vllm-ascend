# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Qwen3-0.6B-multi-instance"
    model: "Qwen/Qwen3-0.6B"
    service_mode: "multi_instance"
    envs:
      SERVER_PORT: "DEFAULT_PORT"
      SERVER_PORT_2: "DEFAULT_PORT"
    server_cmd:
      - - "--port"
        - "$SERVER_PORT"
        - "--gpu-memory-utilization"
        - "0.4"
        - "--max-model-len"
        - "8192"
        - "--enforce-eager"
        - "--trust-remote-code"
      - - "--port"
        - "$SERVER_PORT_2"
        - "--gpu-memory-utilization"
        - "0.4"
        - "--max-model-len"
        - "8192"
        - "--enforce-eager"
        - "--trust-remote-code"
    test_content:
      - "completion"
    benchmarks:
      acc:
        case_type: accuracy
        dataset_path: vllm-ascend/gsm8k-lite
        request_conf: vllm_api_general_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
        max_out_len: 4096
        num_prompts: 32
        batch_size: 32
        baseline: 68
        threshold: 10
      perf:
        case_type: performance
        dataset_path: vllm-ascend/GSM8K-in3500-bs400
        request_conf: vllm_api_stream_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
        num_prompts: 32
        max_out_len: 256
        batch_size: 32
        request_rate: 0
        baseline: 1
        threshold: 0.97
