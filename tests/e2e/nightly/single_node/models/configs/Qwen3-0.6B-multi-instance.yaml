# Regression test for PR #7427: two vllm-ascend instances on a single card.
# The second instance starts while the first is still holding NPU memory.
# Both must initialize without OOM and serve requests correctly.

test_cases:
  - name: "Qwen3-0.6B-multi-instance"
    model: "Qwen/Qwen3-0.6B"
    service_mode: "multi_instance"
    envs:
      SERVER_PORT: "DEFAULT_PORT"
      SERVER_PORT_2: "DEFAULT_PORT"
    server_cmd:
      - "--port"
      - "$SERVER_PORT"
      - "--gpu-memory-utilization"
      - "0.4"
      - "--max-model-len"
      - "512"
      - "--enforce-eager"
      - "--trust-remote-code"
    server_cmd2:
      - "--port"
      - "$SERVER_PORT_2"
      - "--gpu-memory-utilization"
      - "0.4"
      - "--max-model-len"
      - "512"
      - "--enforce-eager"
      - "--trust-remote-code"
    test_content:
      - "completion"
    benchmarks:
      acc:
        case_type: accuracy
        dataset_path: vllm-ascend/gsm8k
        request_conf: vllm_api_general_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
        max_out_len: 512
        num_prompts: 32
        batch_size: 32
        baseline: 1
        threshold: 0.97
      perf:
        case_type: performance
        dataset_path: vllm-ascend/GSM8K-in3500-bs400
        request_conf: vllm_api_stream_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
        num_prompts: 32
        max_out_len: 512
        batch_size: 32
        request_rate: 0
        baseline: 50
        threshold: 5
