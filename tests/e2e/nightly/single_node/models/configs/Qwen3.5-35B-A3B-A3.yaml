# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Qwen3.5-35B-A3B"
    model: "Qwen/Qwen3.5-35B-A3B"
    envs:
      TASK_QUEUE_ENABLE: "1"
      OMP_PROC_BIND: "false"
      VLLM_USE_V1: "1"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "0"
      PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
      HCCL_BUFFSIZE: "1024"
      OMP_NUM_THREADS: "100"
      VLLM_DISABLE_COMPILATION: "1"
      SERVER_PORT: "DEFAULT_PORT"
    server_cmd:
      - "--data-parallel-size"
      - "1"
      - "--tensor-parallel-size"
      - "8"
      - "--port"
      - "$SERVER_PORT"
      - "--seed"
      - "1024"
      - "--max-num-seqs"
      - "32"
      - "--max-model-len"
      - "133000"
      - "--max-num-batched-tokens"
      - "8192"
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_DECODE_ONLY","cudagraph_capture_sizes":[1,2,4,8,16,32,64,80,96,128]}'
      - "--async-scheduling"
      - "--enable-chunked-prefill"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "qwen3"
      - "--enable-log-requests"
      - "--enable-log-deltas"
      - "--uvicorn-log-level"
      - "debug"
      - "--gpu-memory-utilization"
      - "0.92"
      - "--language-model-only"
      - "--additional-config"
      - '{"enable_cpu_binding":true}'
      - "--trust-remote-code"
      - "--enforce-eager"
    benchmarks:
      acc:
        case_type: accuracy
        dataset_path: vllm-ascend/gsm8k-lite
        request_conf: vllm_api_general_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
        max_out_len: 32768
        batch_size: 32
        baseline: 95
        threshold: 5
      perf:
        case_type: performance
        dataset_path: vllm-ascend/GSM8K-in3500-bs400
        request_conf: vllm_api_stream_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
        num_prompts: 80
        max_out_len: 1500
        batch_size: 20
        request_rate: 0
        baseline: 1
        threshold: 0.97
