# ==========================================
# Shared Configurations
# ==========================================

_envs: &envs
  HCCL_BUFFSIZE: "512"
  SERVER_PORT: "DEFAULT_PORT"
  HCCL_OP_EXPANSION_MODE: "AIV"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  TASK_QUEUE_ENABLE: "1"
  VLLM_ASCEND_ENABLE_MLAPO: "1"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
  VLLM_ASCEND_ENABLE_NZ: "1"

_server_cmd: &server_cmd
  - "--enable-expert-parallel"
  - "--allowed-local-media-path"
  - "/"
  - "--tensor-parallel-size"
  - "4"
  - "--data-parallel-size"
  - "4"
  - "--port"
  - "$SERVER_PORT"
  - "--async-scheduling"
  - "--quantization"
  - "ascend"
  - "--trust-remote-code"
  - "--gpu-memory-utilization"
  - "0.9"
  - "--seed"
  - "42"
  - "--mm-processor-cache-gb"
  - "0"
  - "--mm-encoder-tp-mode"
  - "data"

_benchmarks: &benchmarks
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 392
    max_out_len: 1500
    batch_size: 98
    trust_remote_code: true
    request_rate: 0
    baseline: 1
    threshold: 0.97
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k-lite
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 4096
    batch_size: 8
    baseline: 95
    threshold: 5

_benchmark_TPOT50_16K_1K: &_benchmark_TPOT50_16K_1K
  case_type: performance
  dataset_path: vllm-ascend/GSM8K-in3500-bs2800
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 56
  max_out_len: 1500
  batch_size: 14
  trust_remote_code: true
  request_rate: 0
  baseline: 1
  threshold: 0.97

_benchmark_TPOT20_16K_1K: &_benchmark_TPOT20_16K_1K
  case_type: performance
  dataset_path: vllm-ascend/GSM8K-in3500-bs2800
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 32
  max_out_len: 1500
  batch_size: 8
  trust_remote_code: true
  request_rate: 0
  baseline: 1
  threshold: 0.97

_benchmark_TPOT20_32K_0_5K: &_benchmark_TPOT20_32K_0_5K
  case_type: performance
  dataset_path: vllm-ascend/GSM8K-in3500-bs2800
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 16
  max_out_len: 512
  batch_size: 4
  trust_remote_code: true
  request_rate: 0
  baseline: 1
  threshold: 0.97

_benchmark_TPOT20_32K_0_5K_pc90: &_benchmark_TPOT20_32K_0_5K_pc90
  case_type: performance
  dataset_path: vllm-ascend/GSM8K-in3500-bs2800
  request_conf: vllm_api_stream_chat
  dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
  num_prompts: 40
  max_out_len: 512
  batch_size: 10
  trust_remote_code: true
  request_rate: 0
  baseline: 1
  threshold: 0.97

# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "Kimi-K2.5-W4A8-Case"
