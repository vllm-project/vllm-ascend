# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "DeepSeek-V3.2-W8A8-CP16"
    model: "vllm-ascend/DeepSeek-V3.2-W8A8"
    special_dependencies:
      transformers: "5.9.0"
    envs:
      OMP_PROC_BIND: "false"
      OMP_NUM_THREADS: "1"
      HCCL_OP_EXPANSION_MODE: "AIV"
      PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
      VLLM_USE_V1: "1"
      HCCL_BUFFSIZE: "256"
      ASCEND_AGGREGATE_ENABLE: "1"
      ASCEND_TRANSPORT_PRINT: "1"
      ACL_OP_INIT_MODE: "1"
      ASCEND_A3_ENABLE: "1"
      VLLM_NIXL_ABORT_REQUEST_TIMEOUT: "300000"
      TASK_QUEUE_ENABLE: "1"
      SERVER_PORT: "DEFAULT_PORT"
    server_cmd:
      - "--tensor-parallel-size"
      - "1"
      - "--data-parallel-size"
      - "1"
      - "--decode-context-parallel-size"
      - "1"
      - "--prefill-context-parallel-size"
      - "16"
      - "--port"
      - "$SERVER_PORT"
      - "--seed"
      - "1024"
      - "--max-model-len"
      - "67000"
      - "--max-num-batched-tokens"
      - "4096"
      - "--max-num-seqs"
      - "4"
      - "--trust-remote-code"
      - "--quantization"
      - "ascend"
      - "--no-enable-prefix-caching"
      - "--enable-expert-parallel"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--compilation-config"
      - '{"cudagraph_capture_sizes":[1,2,4,8,16,24,32,40,48], "cudagraph_mode":"FULL_DECODE_ONLY"}'
      - "--speculative-config"
      - '{"num_speculative_tokens": 3, "method":"deepseek_mtp"}'
      - "--reasoning-parser"
      - "deepseek_v3"
      - "--tokenizer_mode"
      - "deepseek_v32"
    benchmarks:
      acc:
        case_type: accuracy
        dataset_path: vllm-ascend/gsm8k
        request_conf: vllm_api_general_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
        max_out_len: 24576
        batch_size: 16