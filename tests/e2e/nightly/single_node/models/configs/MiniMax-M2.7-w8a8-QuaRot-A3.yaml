# ==========================================
# ACTUAL TEST CASES
# ==========================================

test_cases:
  - name: "MiniMax-M2.7-w8a8"
    model: "vllm-ascend/MiniMax-M2.7-w8a8-QuaRot"
    envs:
      PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
      TASK_QUEUE_ENABLE: "1"
      HCCL_OP_EXPANSION_MODE: "AIV"
      OMP_PROC_BIND: "false"
      OMP_NUM_THREADS: "1"
      VLLM_USE_V1: "1"
      HCCL_BUFFSIZE: "1536"
      PYTHONHASHSEED: "0"
      HCCL_CONNECT_TIMEOUT: "3000"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
      VLLM_ASCEND_ENABLE_FUSED_MC2: "1"
      VLLM_USE_MODELSCOPE: "true"
      SERVER_PORT: "DEFAULT_PORT"
    server_cmd:
      - "--trust-remote-code"
      - "--port"
      - "$SERVER_PORT"
      - "--max-model-len"
      - "196608"
      - "--max-num-batched-tokens"
      - "16384"
      - "--tensor-parallel-size"
      - "16"
      - "--data-parallel-size"
      - "1"
      - "--pipeline-parallel-size"
      - "1"
      - "--prefill-context-parallel-size"
      - "1"
      - "--decode-context-parallel-size"
      - "2"
      - "--cp-kv-cache-interleave-size"
      - "128"
      - "--block_size"
      - "128"
      - "--max-num-seqs"
      - "32"
      - "--gpu-memory-utilization"
      - "0.75"
      - "--async-scheduling"
      - "--enable-chunked-prefill"
      - "--enable-prefix-caching"
      - "--enable-expert-parallel"
      - "--quantization"
      - "ascend"
      - "--compilation-config"
      - '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      - "--speculative_config"
      - '{"method":"eagle3","model":"Eco-Tech/MiniMax-M2.7-eagle-model-short","num_speculative_tokens":3}'
      - "--additional-config"
      - '{ "enable_weight_nz_layout": true, "enable_cpu_binding": true }'
      - "--mm-processor-cache-gb"
      - "0"
      - "--safetensors-load-strategy"
      - "prefetch"
      - "--allowed-local-media-path"
      - "/"
    benchmarks:
      acc_aime2025:
        case_type: accuracy
        dataset_path: vllm-ascend/aime2025
        request_conf: vllm_api_general_chat
        dataset_conf: aime2025/aime2025_gen_0_shot_chat_prompt
        max_out_len: 65536
        batch_size: 32
        baseline: 90
        threshold: 5
        ignore_eos: false
        bos_token_id: 200019
        do_sample: true
        eos_token_id: 200020
        temperature: 1.0
        top_p: 0.95
        top_k: 40
        transformers_version: 4.46.1
      perf:
        case_type: performance
        dataset_path: vllm-ascend/GSM8K-in3500-bs2800
        request_conf: vllm_api_stream_chat
        dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
        num_prompts: 512
        max_out_len: 1500
        batch_size: 128
        request_rate: 0
        baseline: 1
        threshold: 0.97