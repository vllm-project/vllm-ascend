test_name: "test DeepSeek-V3.1-BF16 on A3"
model: "unsloth/DeepSeek-V3.1-BF16"
num_nodes: 2
npu_per_node: 16
env_common:
  VLLM_USE_MODELSCOPE: true
  HCCL_BUFFSIZE: 2048
  SERVER_PORT: 8080
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 10
  VLLM_ASCEND_FLASHCOMM2_PARALLEL_SIZE: 1


deployment:
  -
    server_cmd: >
      vllm serve unsloth/DeepSeek-V3.1-BF16
      --host 0.0.0.0
      --port $SERVER_PORT
      --data-parallel-size 4
      --tensor-parallel-size 8
      --data-parallel-size-local 2
      --decode-context-parallel-size 8
      --data-parallel-address $LOCAL_IP
      --data-parallel-rpc-port 13399
      --no-enable-prefix-caching
      --max-num-seqs 8
      --max-model-len 8192
      --max-num-batched-tokens 8192
      --enable-expert-parallel
      --trust-remote-code
      --gpu-memory-utilization 0.9
      --async-scheduling
      --speculative-config '{"num_speculative_tokens": 1, "method":"mtp"}'
      --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY", "cudagraph_capture_sizes":[16]}'
      --additional_config '{"enable_multistream_moe": true}'

  -
    server_cmd: >
      vllm serve unsloth/DeepSeek-V3.1-BF16
      --headless
      --data-parallel-size 4
      --tensor-parallel-size 8
      --data-parallel-size-local 2
      --data-parallel-start-rank 2
      --decode-context-parallel-size 8
      --data-parallel-address $MASTER_IP
      --data-parallel-rpc-port 13399
      --no-enable-prefix-caching
      --max-num-seqs 8
      --max-model-len 8192
      --max-num-batched-tokens 8192
      --enable-expert-parallel
      --trust-remote-code
      --gpu-memory-utilization 0.9
      --async-scheduling
      --speculative-config '{"num_speculative_tokens": 1, "method":"mtp"}'
      --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY", "cudagraph_capture_sizes":[16]}'
      --additional_config '{"enable_multistream_moe": true}'
benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 2800
    max_out_len: 1500
    batch_size: 64
    request_rate: 11.2
    baseline: 1
    threshold: 0.97
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 32768
    batch_size: 64
    baseline: 95
    threshold: 5