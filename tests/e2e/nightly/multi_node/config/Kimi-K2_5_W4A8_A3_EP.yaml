test_name: "test Kimi-K2_5_W4A8_A3_EP"
model: "Eco-Tech/Kimi-K2.5-W4A8"
num_nodes: 4
npu_per_node: 16
env_common:
  HCCL_OP_EXPANSION_MODE: AIV
  PYTORCH_NPU_ALLOC_CONF: expandable_segments:True
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 1
  TASK_QUEUE_ENABLE: 1
  SERVER_PORT: "8080"
  VLLM_USE_MODELSCOPE: true

disaggregated_prefill:
  enabled: true
  prefiller_host_index: [ 0, 1 ]
  decoder_host_index: [ 2, 3 ]

deployment:
  - envs:
      HCCL_BUFFSIZE: "256"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
    server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --port $SERVER_PORT
        --data-parallel-size 2
        --data-parallel-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 23570
        --tensor-parallel-size 8
        --enable-expert-parallel
        --seed 1024
        --quantization ascend
        --trust-remote-code
        --max-num-seqs 8
        --max-model-len 32768
        --max-num-batched-tokens 16384
        --no-enable-prefix-caching
        --gpu-memory-utilization 0.8
        --enforce-eager
        --speculative-config '{"method": "eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens": 1}'
        --kv-transfer-config
        '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_producer",
          "kv_port": "30000",
          "engine_id": "0",
          "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
          "kv_connector_extra_config": {
            "prefill": {
              "dp_size": 2,
              "tp_size": 8
            },
            "decode": {
              "dp_size": 32,
              "tp_size": 1
            }
          }
        }'
  - envs:
      HCCL_BUFFSIZE: "256"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
    server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --port $SERVER_PORT
        --data-parallel-size 2
        --data-parallel-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 23570
        --tensor-parallel-size 8
        --enable-expert-parallel
        --seed 1024
        --quantization ascend
        --trust-remote-code
        --max-num-seqs 8
        --max-model-len 32768
        --max-num-batched-tokens 16384
        --no-enable-prefix-caching
        --gpu-memory-utilization 0.8
        --enforce-eager
        --speculative-config '{"method": "eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens": 1}'
        --kv-transfer-config
        '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_producer",
          "kv_port": "30100",
          "engine_id": "1",
          "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
          "kv_connector_extra_config": {
            "prefill": {
              "dp_size": 2,
              "tp_size": 8
            },
            "decode": {
              "dp_size": 32,
              "tp_size": 1
            }
          }
        }'
  - envs:
      HCCL_BUFFSIZE: "1800"
      VLLM_ASCEND_ENABLE_MLAPO: "1"
    server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --port $SERVER_PORT
        --data-parallel-size 32
        --data-parallel-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 23571
        --tensor-parallel-size 1
        --enable-expert-parallel
        --seed 1024
        --quantization ascend
        --trust-remote-code
        --max-num-seqs 48
        --max-model-len 32768
        --max-num-batched-tokens 256
        --no-enable-prefix-caching
        --gpu-memory-utilization 0.95
        --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY", "cudagraph_capture_sizes":[4,8,16,32,48,64,80,96,112,128,144,160]}'
        --additional-config '{"recompute_scheduler_enable":true,"multistream_overlap_shared_expert": false}'
        --speculative-config '{"method": "eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens": 1}'
        --kv-transfer-config
        '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_consumer",
          "kv_port": "30200",
          "engine_id": "2",
          "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
          "kv_connector_extra_config": {
            "prefill": {
              "dp_size": 2,
              "tp_size": 8
            },
            "decode": {
              "dp_size": 32,
              "tp_size": 1
            }
          }
        }'
  - envs:
      HCCL_BUFFSIZE: "1800"
      VLLM_ASCEND_ENABLE_MLAPO: "1"
    server_cmd: >
      vllm serve Eco-Tech/Kimi-K2.5-W4A8
        --host 0.0.0.0
        --port $SERVER_PORT
        --data-parallel-size 32
        --data-parallel-rank 16
        --data-parallel-address $MASTER_IP
        --data-parallel-rpc-port 23571
        --tensor-parallel-size 1
        --enable-expert-parallel
        --seed 1024
        --quantization ascend
        --trust-remote-code
        --max-num-seqs 48
        --max-model-len 32768
        --max-num-batched-tokens 256
        --no-enable-prefix-caching
        --gpu-memory-utilization 0.95
        --compilation-config '{"cudagraph_mode": "FULL_DECODE_ONLY", "cudagraph_capture_sizes":[4,8,16,32,48,64,80,96,112,128,144,160]}'
        --additional-config '{"recompute_scheduler_enable":true,"multistream_overlap_shared_expert": false}'
        --speculative-config '{"method": "eagle3", "model":"lightseekorg/kimi-k2.5-eagle3", "num_speculative_tokens": 3}'
        --kv-transfer-config
        '{"kv_connector": "MooncakeConnectorV1",
          "kv_role": "kv_consumer",
          "kv_port": "30200",
          "engine_id": "2",
          "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
          "kv_connector_extra_config": {
            "prefill": {
              "dp_size": 2,
              "tp_size": 8
            },
            "decode": {
              "dp_size": 32,
              "tp_size": 1
            }
          }
        }'

benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 160
    max_out_len: 1500
    batch_size: 40
    trust_remote_code: True
    request_rate: 0
    baseline: 1
    threshold: 0.97
