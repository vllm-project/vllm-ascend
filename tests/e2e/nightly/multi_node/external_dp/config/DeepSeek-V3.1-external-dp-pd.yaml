test_name: "test DeepSeek-V3.1 external dp pd 2P1D"
model: "Eco-Tech/DeepSeek-V3.1-w8a8-mtp-QuaRot"
request_model: "deepseek_v3"
num_nodes: 4
npu_per_node: 16

env_common: &env_common
  VLLM_USE_MODELSCOPE: "true"
  VLLM_RPC_TIMEOUT: "3600000"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "30000"
  HCCL_EXEC_TIMEOUT: "204"
  HCCL_CONNECT_TIMEOUT: "120"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "10"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  TASK_QUEUE_ENABLE: "1"
  HCCL_OP_EXPANSION_MODE: "AIV"
  VLLM_USE_V1: "1"
  ASCEND_BUFFER_POOL: "4:8"
  LD_LIBRARY_PATH: "/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH"

config_common: &config_common
  host: "0.0.0.0"
  port_start: 7100
  dp_rpc_port: 12321
  healthcheck_path: "/health"
  ready_timeout: 3600

routing:
  type: "disaggregated_prefill"
  proxy_node_index: 0
  proxy_host: "$NODE_0_IP"
  proxy_port: 1999
  proxy_script: "examples/disaggregated_prefill_v1/load_balance_proxy_server_example.py"
  groups:
    prefiller: [0, 1]
    decoder: [2, 3]

config:
  - node_index: 0
    <<: *config_common
    dp_group: prefill_0
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    pp_size: 1
    dp_address: "$NODE_0_IP"

  - node_index: 1
    <<: *config_common
    dp_group: prefill_1
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    pp_size: 1
    dp_address: "$NODE_1_IP"

  - node_index: 2
    <<: *config_common
    dp_group: decode
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 0
    tp_size: 1
    pp_size: 1
    dp_address: "$NODE_2_IP"

  - node_index: 3
    <<: *config_common
    dp_group: decode
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 16
    tp_size: 1
    pp_size: 1
    dp_address: "$NODE_2_IP"

templates:
  - envs:
      <<: *env_common
      HCCL_BUFFSIZE: "256"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
    server_cmd_template:
      - --host
      - ${HOST}
      - --port
      - ${PORT}
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --served-model-name
      - ${REQUEST_MODEL}
      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "16384"
      - --max-num-seqs
      - "8"
      - --enforce-eager
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.9"
      - --quantization
      - ascend
      - --no-enable-prefix-caching
      - --speculative-config
      - '{"num_speculative_tokens":1,"method":"mtp"}'
      - --additional-config
      - '{"recompute_scheduler_enable":true}'
      - --kv-transfer-config
      - '{"kv_connector":"MooncakeConnectorV1","kv_role":"kv_producer","kv_port":"30000","engine_id":"0","kv_connector_extra_config":{"prefill":{"dp_size":2,"tp_size":8},"decode":{"dp_size":32,"tp_size":1}}}'

  - envs:
      <<: *env_common
      HCCL_BUFFSIZE: "256"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
    server_cmd_template:
      - --host
      - ${HOST}
      - --port
      - ${PORT}
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --served-model-name
      - ${REQUEST_MODEL}
      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "16384"
      - --max-num-seqs
      - "8"
      - --enforce-eager
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.9"
      - --quantization
      - ascend
      - --no-enable-prefix-caching
      - --speculative-config
      - '{"num_speculative_tokens":1,"method":"mtp"}'
      - --additional-config
      - '{"recompute_scheduler_enable":true}'
      - --kv-transfer-config
      - '{"kv_connector":"MooncakeConnectorV1","kv_role":"kv_producer","kv_port":"30100","engine_id":"1","kv_connector_extra_config":{"prefill":{"dp_size":2,"tp_size":8},"decode":{"dp_size":32,"tp_size":1}}}'

  - envs:
      <<: *env_common
      HCCL_BUFFSIZE: "1100"
      VLLM_ASCEND_ENABLE_MLAPO: "1"
    server_cmd_template: &deepseek_decoder_cmd
      - --host
      - ${HOST}
      - --port
      - ${PORT}
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --served-model-name
      - ${REQUEST_MODEL}
      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "256"
      - --max-num-seqs
      - "28"
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.92"
      - --quantization
      - ascend
      - --no-enable-prefix-caching
      - --async-scheduling
      - --speculative-config
      - '{"num_speculative_tokens":1,"method":"mtp"}'
      - --compilation-config
      - '{"cudagraph_mode":"FULL_DECODE_ONLY","cudagraph_capture_sizes":[2,4,8,16,24,32,48,56]}'
      - --additional-config
      - '{"recompute_scheduler_enable":true,"multistream_overlap_shared_expert":true,"finegrained_tp_config":{"lmhead_tensor_parallel_size":16}}'
      - --kv-transfer-config
      - '{"kv_connector":"MooncakeConnectorV1","kv_role":"kv_consumer","kv_port":"30200","engine_id":"2","kv_connector_extra_config":{"prefill":{"dp_size":2,"tp_size":8},"decode":{"dp_size":32,"tp_size":1}}}'

  - envs:
      <<: *env_common
      HCCL_BUFFSIZE: "1100"
      VLLM_ASCEND_ENABLE_MLAPO: "1"
    server_cmd_template: *deepseek_decoder_cmd

benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 16
    max_out_len: 128
    batch_size: 4
    request_rate: 1
    baseline: 1
    threshold: 0.1

  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 512
    batch_size: 4
    baseline: 0
    threshold: 100
