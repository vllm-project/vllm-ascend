test_name: "test Qwen3-235B-A22B three node PD separation with mooncake connector"
model: "vllm-ascend/Qwen3-235B-A22B"
num_nodes: 3
npu_per_node: 16
env_common: &env_common
  VLLM_USE_MODELSCOPE: true
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 1
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  HCCL_OP_EXPANSION_MODE: "AIV"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
  VLLM_ASCEND_ENABLE_FUSED_MC2: 2
  TASK_QUEUE_ENABLE: 1
  SERVER_PORT: 8000
  LD_LIBRARY_PATH: "/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH"
  DISAGGREGATED_PREFILL_PROXY_SCRIPT: "examples/disaggregated_prefill_v1/load_balance_proxy_layerwise_server_example.py"

disaggregated_prefill:
  enabled: true
  prefiller_host_index: [0]
  decoder_host_index: [1, 2]

deployment:
  -
    envs:
      <<: *env_common
      HCCL_BUFFSIZE: 512
    server_cmd: >
        vllm serve "vllm-ascend/Qwen3-235B-A22B"
        --host 0.0.0.0
        --port $SERVER_PORT
        --tensor-parallel-size 8
        --data-parallel-size 2
        --data-parallel-size-local 2
        --data-parallel-start-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 13389
        --seed 1024
        --served-model-name qwen3
        --max-num-seqs 24
        --max-model-len 40960
        --max-num-batched-tokens 16384
        --enable-expert-parallel
        --enforce-eager
        --trust-remote-code
        --no-enable-prefix-caching
        --gpu-memory-utilization 0.9
        --kv-transfer-config
        '{"kv_connector": "MooncakeLayerwiseConnector",
        "kv_role": "kv_producer",
        "kv_port": "30000",
        "kv_connector_extra_config": {
                  "prefill": {
                          "dp_size": 2,
                          "tp_size": 8
                  },
                  "decode": {
                          "dp_size": 8,
                          "tp_size": 4
                  }
            }
        }'
  -
    envs:
      <<: *env_common
      HCCL_BUFFSIZE: 1024
    server_cmd: >
        vllm serve "vllm-ascend/Qwen3-235B-A22B"
        --host 0.0.0.0
        --port $SERVER_PORT
        --tensor-parallel-size 4
        --data-parallel-size 8
        --data-parallel-size-local 4
        --data-parallel-start-rank 0
        --data-parallel-address $LOCAL_IP
        --data-parallel-rpc-port 13389
        --seed 1024
        --served-model-name qwen3
        --max-num-seqs 128
        --max-model-len 40960
        --max-num-batched-tokens 256
        --enable-expert-parallel
        --trust-remote-code
        --gpu-memory-utilization 0.9
        --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
        --no-enable-prefix-caching
        --kv-transfer-config
        '{"kv_connector": "MooncakeLayerwiseConnector",
        "kv_role": "kv_consumer",
        "kv_port": "30100",
        "kv_connector_extra_config": {
                  "prefill": {
                          "dp_size": 2,
                          "tp_size": 8
                  },
                  "decode": {
                          "dp_size": 8,
                          "tp_size": 4
                  }
            }
        }'
  -
    envs:
      <<: *env_common
      HCCL_BUFFSIZE: 1024
    server_cmd: >
        vllm serve "vllm-ascend/Qwen3-235B-A22B"
        --host 0.0.0.0
        --port $SERVER_PORT
        --headless
        --tensor-parallel-size 4
        --data-parallel-size 8
        --data-parallel-size-local 4
        --data-parallel-start-rank 4
        --data-parallel-address $MASTER_IP
        --data-parallel-rpc-port 13389
        --seed 1024
        --served-model-name qwen3
        --max-num-seqs 128
        --max-model-len 40960
        --max-num-batched-tokens 256
        --enable-expert-parallel
        --trust-remote-code
        --gpu-memory-utilization 0.9
        --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
        --no-enable-prefix-caching
        --kv-transfer-config
        '{"kv_connector": "MooncakeLayerwiseConnector",
        "kv_role": "kv_consumer",
        "kv_port": "30100",
        "kv_connector_extra_config": {
                  "prefill": {
                          "dp_size": 2,
                          "tp_size": 8
                  },
                  "decode": {
                          "dp_size": 8,
                          "tp_size": 4
                  }
            }
        }'

benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K-in3500-bs2800
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 2800
    max_out_len: 1500
    batch_size: 700
    request_rate: 11.2
    baseline: 183
    threshold: 0.97
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gsm8k-lite
    request_conf: vllm_api_general_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_chat_prompt
    max_out_len: 7680
    batch_size: 512
    baseline: 97
    threshold: 3