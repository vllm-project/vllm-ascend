test_name: "test DeepSeek-V4-Pro-W4A8 on A3 dual nodes"
model: "Eco-Tech/DeepSeek-V4-Pro-w4a8-mtp"
num_nodes: 2
npu_per_node: 16
special_dependencies:
  transformers: "5.9.0"

env_common: &env_common
  HCCL_OP_EXPANSION_MODE: AIV
  HCCL_BUFFSIZE: 1024
  VLLM_USE_MODELSCOPE: true
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  OMP_PROC_BIND: false
  OMP_NUM_THREADS: 10
  TASK_QUEUE_ENABLE: 1
  #  LD_PRELOAD: /usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD
  #  LD_LIBRARY_PATH: $LD_LIBRARY_PATH:/usr/local/lib/
  HCCL_CONNECT_TIMEOUT: 7200
  ASCEND_CONNECT_TIMEOUT: 10000
  ASCEND_TRANSFER_TIMEOUT: 10000
  VLLM_RPC_TIMEOUT: 1800000
  VLLM_ASCEND_APPLY_DSV4_PATCH: 1
  VLLM_ASCEND_ENABLE_FLASHCOMM1: 1
  SERVER_PORT: 8900

deployment:
  - envs:
      <<: *env_common
    server_cmd: >
      vllm serve Eco-Tech/DeepSeek-V4-Pro-w4a8-mtp
      --safetensors-load-strategy prefetch
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 128}'
      --max-model-len 135000
      --max-num-batched-tokens 4096
      --gpu-memory-utilization 0.9
      --max-num-seqs 16
      --data-parallel-size 2
      --data-parallel-size-local 1
      --data-parallel-start-rank 0
      --data-parallel-address $LOCAL_IP
      --data-parallel-rpc-port 13399
      --tensor-parallel-size 16
      --enable-expert-parallel
      --quantization ascend
      --port $SERVER_PORT
      --host 0.0.0.0
      --block-size 128
      --async-scheduling
      --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      --tokenizer-mode deepseek_v4
      --tool-call-parser deepseek_v4
      --enable-auto-tool-choice
      --reasoning-parser deepseek_v4
      --speculative-config '{"num_speculative_tokens": 1,"method": "mtp","enforce_eager": true}'
      --api-server-count 1
      --additional-config '{"ascend_compilation_config":{"enable_npugraph_ex":true,"enable_static_kernel":false},"enable_cpu_binding":"true","multistream_overlap_shared_expert":true}'

  - envs:
      <<: *env_common
    server_cmd: >
      vllm serve Eco-Tech/DeepSeek-V4-Pro-w4a8-mtp
      --safetensors-load-strategy prefetch
      --model-loader-extra-config '{"enable_multithread_load": "true", "num_threads": 128}'
      --max-model-len 135000
      --max-num-batched-tokens 4096
      --gpu-memory-utilization 0.9
      --max-num-seqs 16
      --data-parallel-size 2
      --data-parallel-size-local 1
      --data-parallel-start-rank 1
      --data-parallel-address $MASTER_IP
      --headless
      --data-parallel-rpc-port 13399
      --tensor-parallel-size 16
      --enable-expert-parallel
      --quantization ascend
      --port $SERVER_PORT
      --host 0.0.0.0
      --block-size 128
      --async-scheduling
      --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}'
      --tokenizer-mode deepseek_v4
      --tool-call-parser deepseek_v4
      --enable-auto-tool-choice
      --reasoning-parser deepseek_v4
      --speculative-config '{"num_speculative_tokens": 1,"method": "mtp","enforce_eager": true}'
      --additional-config '{"ascend_compilation_config":{"enable_npugraph_ex":true,"enable_static_kernel":false},"enable_cpu_binding":"true","multistream_overlap_shared_expert":true}'

benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix90_in131072_bs100_deepseek
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 24
    max_out_len: 1024
    batch_size: 6
    request_rate: 0
    baseline: 1
    threshold: 0.97

  acc-gpqa:
    case_type: accuracy
    dataset_path: vllm-ascend/gpqa
    request_conf: vllm_api_general_chat
    dataset_conf: gpqa/gpqa_gen_0_shot_cot_chat_prompt
    max_out_len: 65536
    batch_size: 32
    baseline: 86.36
    threshold: 3
    thinking: true
