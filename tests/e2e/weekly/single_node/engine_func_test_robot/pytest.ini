[pytest]
pythonpath = .
log_cli = true
log_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s:%(filename)s:%(lineno)d %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_file = logs/test.log
log_file_level = DEBUG
addopts = -sv --color=yes --ignore=tests/badcase --ignore=tests/n --ignore=tests/mm --ignore=tests/image_edit --ignore=tests/image_generations --ignore=tests/request_id --ignore=tests/tool_choice/test_parallel_tool_calls_normal.py --ignore=tests/tool_choice/test_parallel_tool_calls_abnormal.py --ignore=tests/tool_choice/test_parallel_tool_calls_boundary.py
; addopts = -sv --color=yes --ignore=tests/badcase --ignore=tests/n --ignore=tests/chat_template_kwargs --ignore=tests/content --ignore=tests/frequency_penalty --ignore=tests/image_edit --ignore=tests/max_completion_tokens --ignore=tests/max_tokens --ignore=tests/presence_penalty --ignore=tests/repetition_penalty --ignore=tests/role --ignore=tests/stop --ignore=tests/temperature --ignore=tests/tool_choice --ignore=tests/top_k --ignore=tests/top_p
testpaths = tests