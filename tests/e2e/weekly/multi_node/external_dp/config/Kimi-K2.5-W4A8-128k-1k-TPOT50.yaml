benchmarks:
  perf:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix90_in131072_bs1000_kimi
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 512
    max_out_len: 1024
    batch_size: 128
    request_rate: 3
    baseline: 1
    threshold: 0.95
