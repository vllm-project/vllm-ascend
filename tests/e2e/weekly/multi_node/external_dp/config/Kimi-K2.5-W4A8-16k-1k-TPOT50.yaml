templates:
  - node_index: 0
    envs:
      SERVER_PORT: "${PORT}"
      VLLM_RPC_TIMEOUT: "3600000"
      VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "30000"
      HCCL_OP_EXPANSION_MODE: "AIV"
      PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
      OMP_PROC_BIND: "false"
      OMP_NUM_THREADS: "1"
      TASK_QUEUE_ENABLE: "1"
      ASCEND_BUFFER_POOL: "4:8"
      HCCL_BUFFSIZE: "256"
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
      ASCEND_RT_VISIBLE_DEVICES: "${VISIBLE_DEVICES}"
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --quantization
      - "ascend"
      - --trust-remote-code
      - --max-num-seqs
      - "8"
      - --max-model-len
      - "32768"
      - --max-num-batched-tokens
      - "16384"
      - --no-enable-prefix-caching
      - --gpu-memory-utilization
      - "0.8"
      - --enforce-eager
      - --speculative-config
      - '{"method": "eagle3", "model":"/mnt/share/weight/lightseekorg_kimi-k2.5-eagle3", "num_speculative_tokens": 3}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1", "kv_role": "kv_producer", "kv_port": "30000", "engine_id": "0", "kv_connector_extra_config": {"prefill": {"dp_size": 2, "tp_size": 8}, "decode": {"dp_size": 32, "tp_size": 1}}}'

  - node_index: 1
    envs:
      SERVER_PORT: "${PORT}"
