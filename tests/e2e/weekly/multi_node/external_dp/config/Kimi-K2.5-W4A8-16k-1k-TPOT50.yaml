test_name: "multi-node-kimi-k2.5-w4a8-ep-external-dp-16k-1k-TPOT50"
model: "/mnt/weight/kimi25_w4a8_static_m6"
num_nodes: 4
npu_per_node: 16
cluster_hosts:
  - "141.61.81.143"
  - "141.61.81.131"
  - "141.61.81.33"
  - "141.61.81.31"

routing:
  type: "disaggregated_prefill"
  groups:
    prefiller: [0, 1]
    decoder: [2, 3]

config:
  - node_index: 0
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    dp_address: "${NODE_0_IP}"

  - node_index: 1
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    dp_address: "${NODE_1_IP}"

  - node_index: 2
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 0
    tp_size: 1
    dp_address: "${NODE_2_IP}"

  - node_index: 3
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 16
    tp_size: 1
    dp_address: "${NODE_2_IP}"

