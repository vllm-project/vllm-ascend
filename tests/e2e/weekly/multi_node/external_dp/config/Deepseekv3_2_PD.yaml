
#16384-1024-0-64-16-1
#16384-1024-0-256-64-1
#32768-512-0-32-8-1
#32768-512-0-128-32-0.7
#65536-1024-0-4-1-1
#65536-1024-0-16-4-1
#131072-1024-0-4-1-0.05
#131072-1024-0-16-4-0.05
test_name: "dsv3.2-PD"
model: "vllm-ascend/DeepSeek-V3.2-W8A8"
num_nodes: 4
npu_per_node: 16

routing:
  type: "disaggregated_prefill"
  groups:
    prefiller: [0, 1]
    decoder: [2, 3]

config:
  - node_index: 0
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 1
    dp_rank_start: 0
    tp_size: 16
    dp_address: "${NODE_0_IP}"

  - node_index: 1
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 1
    dp_rank_start: 1
    tp_size: 16
    dp_address: "${NODE_0_IP}"

  - node_index: 2
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 8
    dp_size_local: 4
    dp_rank_start: 0
    tp_size: 4
    dp_address: "${NODE_2_IP}"

  - node_index: 3
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 8
    dp_size_local: 4
    dp_rank_start: 4
    tp_size: 4
    dp_address: "${NODE_2_IP}"

env_common: &env_common

  VLLM_USE_MODELSCOPE: "true"
  SERVER_PORT: "${PORT}"
  ASCEND_RT_VISIBLE_DEVICES: "${VISIBLE_DEVICES}"
  VLLM_ENGINE_READY_TIMEOUT_S: "7200"
  HCCL_CONNECT_TIMEOUT: "1200"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "1"
  HCCL_OP_EXPANSION_MODE: "AIV"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  VLLM_USE_V1: "1"
  ASCEND_AGGREGATE_ENABLE: "1"
  ASCEND_TRANSPORT_PRINT: "1"
  ACL_OP_INIT_MODE: "1"
  ASCEND_A3_ENABLE: "1"
  VLLM_NIXL_ABORT_REQUEST_TIMEOUT: "300000"
  VLLM_ASCEND_ENABLE_FUSED_MC2: "1"

templates:
  - node_index: 0
    envs:
      <<: *env_common
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
      HCCL_BUFFSIZE: "360"
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port- $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "133000"
      - --max-num-batched-tokens
      - "8192"
      - --trust-remote-code
      - --max-num-seqs
      - "16"
      - --gpu-memory-utilization
      - "0.95"
      - --quantization
      - "ascend"
      - --enforce-eager
      - --no-enable-prefix-caching
      - --tokenizer-mode
      - "deepseek_v32"
      - --reasoning-parser
      - "deepseek_v3"
      - --speculative-config
      - '{"num_speculative_tokens": 2, "method":"deepseek_mtp"}'
      - --additional-config
      - '{"layer_sharding": ["q_b_proj", "o_proj"]}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1",
        "kv_role": "kv_producer",
        "kv_port": "30000",
        "engine_id": "0",
        "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 2,
                            "tp_size": 16
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
            }
        }'

  - node_index: 1
    envs:
      <<: *env_common
      VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"
      HCCL_BUFFSIZE: "360"
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port- $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "133000"
      - --max-num-batched-tokens
      - "8192"
      - --trust-remote-code
      - --max-num-seqs
      - "16"
      - --gpu-memory-utilization
      - "0.95"
      - --quantization
      - "ascend"
      - --enforce-eager
      - --no-enable-prefix-caching
      - --tokenizer-mode
      - "deepseek_v32"
      - --reasoning-parser
      - "deepseek_v3"
      - --speculative-config
      - '{"num_speculative_tokens": 2, "method":"deepseek_mtp"}'
      - --additional-config
      - '{"layer_sharding": ["q_b_proj", "o_proj"]}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1",
        "kv_role": "kv_producer",
        "kv_port": "30000",
        "engine_id": "1",
        "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 2,
                            "tp_size": 16
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
            }
        }'

  - node_index: 2
    envs:
      <<: *env_common
      VLLM_ASCEND_ENABLE_MLAPO: "1"
      TASK_QUEUE_ENABLE: "1"
      HCCL_BUFFSIZE: "1100"
      DYNAMIC_EPLB: "true"
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "133000"
      - --max-num-batched-tokens
      - "100"
      - --speculative-config
      - '{"num_speculative_tokens": 2, "method":"deepseek_mtp"}'
      - --compilation-config
      - '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[3,6,9,12,15,18,21,24,27,30,33,36,39,42]}'
      - --additional-config
      - '{"recompute_scheduler_enable": true,"eplb_config": {"dynamic_eplb":true,"expert_heat_collection_interval":2000,"algorithm_execution_interval":50, "eplb_policy_type":3, "num_redundant_experts":0}}'
      - --trust-remote-code
      - --max-num-seqs
      - "14"
      - --gpu-memory-utilization
      - "0.92"
      - --no-enable-prefix-caching
      - --async-scheduling
      - --quantization
      - "ascend"
      - --tokenizer-mode
      - "deepseek_v32"
      - --reasoning-parser
      - "deepseek_v3"
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1",
        "kv_role": "kv_consumer",
        "kv_port": "30300",
        "engine_id": "2",
        "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
        "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 2,
                            "tp_size": 16
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
            }
        }'

  - node_index: 3
    envs:
      <<: *env_common
      VLLM_ASCEND_ENABLE_MLAPO: "1"
      TASK_QUEUE_ENABLE: "1"
      HCCL_BUFFSIZE: "1100"
      DYNAMIC_EPLB: "true"
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "133000"
      - --max-num-batched-tokens
      - "100"
      - --speculative-config
      - '{"num_speculative_tokens": 2, "method":"deepseek_mtp"}'
      - --compilation-config
      - '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[3,6,9,12,15,18,21,24,27,30,33,36,39,42]}'
      - --additional-config
      - '{"recompute_scheduler_enable": true,"eplb_config": {"dynamic_eplb":true,"expert_heat_collection_interval":2000,"algorithm_execution_interval":50, "eplb_policy_type":3, "num_redundant_experts":0}}'
      - --trust-remote-code
      - --max-num-seqs
      - "14"
      - --gpu-memory-utilization
      - "0.92"
      - --no-enable-prefix-caching
      - --async-scheduling
      - --quantization
      - "ascend"
      - --tokenizer-mode
      - "deepseek_v32"
      - --reasoning-parser
      - "deepseek_v3"
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeConnectorV1",
        "kv_role": "kv_consumer",
        "kv_port": "30300",
        "engine_id": "3",
        "kv_connector_module_path": "vllm_ascend.distributed.mooncake_connector",
        "kv_connector_extra_config": {
                    "use_ascend_direct": true,
                    "prefill": {
                            "dp_size": 2,
                            "tp_size": 16
                    },
                    "decode": {
                            "dp_size": 8,
                            "tp_size": 4
                    }
            }
        }'

benchmarks:
  perf_1:
    case_type: performance
    dataset_path: vllm-ascend/GSM8K_prefix0_in16384_bs1200_deepseek
    request_conf: vllm_api_stream_chat
    dataset_conf: gsm8k/gsm8k_gen_0_shot_cot_str_perf
    num_prompts: 64
    max_out_len: 1024
    batch_size: 16
    request_rate: 1
    baseline: 1
    threshold: 0.97

  perf_2:
