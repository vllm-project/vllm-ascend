# Test Models Configuration for vLLM Ascend Release Validation
#
# This file defines representative models for functional testing.
# Each model covers specific features and code paths.
#
# Selection criteria:
# 1. Coverage: Each model tests different code paths
# 2. Availability: Models accessible in test environment
# 3. Stability: Models with known-good baselines
# 4. Popularity: Commonly used by the community

# Hardware configurations
hardware:
  910B:
    memory_gb: 64
    supported_features:
      - graph_mode
      - expert_parallel
      - multimodal
      - mtp
      - flashcomm
  310P:
    memory_gb: 24
    supported_features:
      - graph_mode

# Model definitions
models:
  # Dense LLM - Basic inference, attention
  - name: Qwen3-8B
    path: /models/Qwen/Qwen3-8B
    category: dense
    tensor_parallel: 1
    max_model_len: 8192
    features:
      - graph_mode
    test_prompt: "Explain the concept of machine learning in simple terms."
    expected_min_throughput: 800
    is_multimodal: false
    description: |
      Tests basic dense model inference, attention mechanisms,
      and graph mode compilation.

  # MoE LLM - Expert parallelism, MoE routing
  - name: Qwen3-MoE-7B
    path: /models/Qwen/Qwen3-MoE-A2.7B
    category: moe
    tensor_parallel: 1
    max_model_len: 4096
    features:
      - graph_mode
      - expert_parallel
    test_prompt: "What are the advantages of Mixture of Experts models?"
    expected_min_throughput: 500
    is_multimodal: false
    description: |
      Tests MoE routing, expert parallelism, and load balancing.
      Critical for validating EP functionality.

  # VL Model - Multimodal, image processing
  - name: Qwen3-VL-7B
    path: /models/Qwen/Qwen3-VL-7B-Instruct
    category: multimodal
    tensor_parallel: 1
    max_model_len: 4096
    features:
      - graph_mode
      - multimodal
    test_prompt: "Describe what you see in this image."
    expected_min_throughput: 400
    is_multimodal: true
    image_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Cat03.jpg/1200px-Cat03.jpg"
    description: |
      Tests multimodal processing, image encoding, and VL fusion.
      Validates the entire multimodal pipeline.

  # Long Context - Memory management
  - name: Qwen3-32B-128K
    path: /models/Qwen/Qwen3-32B
    category: long_context
    tensor_parallel: 4
    max_model_len: 131072
    features:
      - graph_mode
    test_prompt: "Summarize the key points from the following document..."
    expected_min_throughput: 300
    is_multimodal: false
    description: |
      Tests long context handling, memory management, and TP scaling.
      Validates KV cache efficiency with large sequences.

  # Speculative Decoding - MTP
  - name: DeepSeek-V3
    path: /models/deepseek-ai/DeepSeek-V3
    category: speculative
    tensor_parallel: 8
    max_model_len: 8192
    features:
      - graph_mode
      - expert_parallel
      - mtp
    test_prompt: "Write a Python function to calculate fibonacci numbers."
    expected_min_throughput: 600
    is_multimodal: false
    description: |
      Tests speculative decoding with MTP proposer.
      Validates MoE + speculative decoding integration.

  # Next-generation architecture
  - name: Qwen3-Next
    path: /models/Qwen/Qwen3-Next-8B
    category: next_gen
    tensor_parallel: 1
    max_model_len: 8192
    features:
      - graph_mode
    test_prompt: "Explain quantum computing to a beginner."
    expected_min_throughput: 700
    is_multimodal: false
    description: |
      Tests latest model architecture support.
      Validates forward compatibility with new models.

# Test configurations
test_config:
  # Timeouts
  startup_timeout: 600  # 10 minutes for large models
  inference_timeout: 120  # 2 minutes per request
  throughput_test_requests: 10

  # Accuracy baselines (optional, for reference)
  accuracy_baselines:
    Qwen3-8B:
      mmlu: 0.65
      humaneval: 0.45
    Qwen3-MoE-7B:
      mmlu: 0.60
      humaneval: 0.40
    DeepSeek-V3:
      mmlu: 0.75
      humaneval: 0.60

# Feature test matrix
feature_tests:
  graph_mode:
    description: "ACL Graph compilation and execution"
    validation: "Check for 'Graph mode enabled' in logs"

  expert_parallel:
    description: "Expert parallelism for MoE models"
    validation: "Check for 'Expert parallel enabled' in logs"
    applicable_to:
      - moe
      - speculative

  multimodal:
    description: "Multimodal (VL) support"
    validation: "Successfully process image + text request"
    applicable_to:
      - multimodal

  mtp:
    description: "Multi-Token Prediction speculative decoding"
    validation: "Check for 'MTP proposer initialized' in logs"
    applicable_to:
      - speculative

  flashcomm:
    description: "Flash Communication optimization"
    validation: "Check for 'FlashComm enabled' in logs"
    applicable_to:
      - moe
      - speculative
