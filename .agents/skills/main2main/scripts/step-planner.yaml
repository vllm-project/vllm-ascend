# Step planner configuration for main2main.
#
# Each category maps file path patterns to a risk score.
# The planner uses these to decide how to group upstream commits into steps:
#   - Commits touching high-risk categories get their own step.
#   - Low-risk commits are batched together within the budget limits.
#
# Patterns are matched as prefixes against `git diff --name-only` output.
# The first matching category wins (order matters for overlapping patterns).

categories:
  platform:
    patterns:
      - "vllm/platforms/"
    risk_score: 9

  attention:
    patterns:
      - "vllm/model_executor/layers/attention/"
      - "vllm/v1/attention/"
    risk_score: 9

  worker:
    patterns:
      - "vllm/v1/worker/"
      - "vllm/worker/"
    risk_score: 8

  moe:
    patterns:
      - "vllm/model_executor/layers/fused_moe/"
    risk_score: 8

  distributed:
    patterns:
      - "vllm/distributed/"
    risk_score: 7

  spec_decode:
    patterns:
      - "vllm/v1/worker/gpu/spec_decode/"
      - "vllm/config/speculative"
    risk_score: 7

  compilation:
    patterns:
      - "vllm/compilation/"
    risk_score: 6

  config:
    patterns:
      - "vllm/config"
    risk_score: 6

  quantization:
    patterns:
      - "vllm/model_executor/layers/quantization/"
    risk_score: 5

  model:
    patterns:
      - "vllm/model_executor/models/"
    risk_score: 5

  test:
    patterns:
      - "tests/"
    risk_score: 2

  docs:
    patterns:
      - "docs/"
      - "*.md"
    risk_score: 1

  # Fallback for files that don't match any other pattern.
  misc:
    patterns:
      - "*"
    risk_score: 3

# Budget limits control how commits are grouped into steps.
budgets:
  # Maximum cumulative risk score for a single step.
  risk_budget: 12

  # Maximum number of commits in a single step.
  commit_count_budget: 5

  # Commits with a risk score >= this threshold are forced into their own step,
  # regardless of budget. This prevents a single high-risk commit from being
  # diluted by bundling it with safe changes.
  force_solo_threshold: 8
